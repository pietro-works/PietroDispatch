<!DOCTYPE html><html lang="en"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Pietro.works тАФ Slides</title>
<style>
@font-face{font-family:'Clash Display';src:url('fonts/clash-500.woff2') format('woff2');font-weight:500;font-display:swap;}
@font-face{font-family:'Clash Display';src:url('fonts/clash-600.woff2') format('woff2');font-weight:600;font-display:swap;}
@font-face{font-family:'Clash Display';src:url('fonts/clash-700.woff2') format('woff2');font-weight:700;font-display:swap;}

<style>
  :root{--ink:#eef4ff;--muted:#9fb0d0;--dim:#6b7da0;--cyan:#39e8ff;--green:#00ff99;--purple:#a855f7;}
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;overflow:hidden;background:#05080f;}
  .stage-wrap{position:fixed;inset:0;overflow:hidden;}
  .stage{position:absolute;top:50%;left:50%;width:1080px;height:1080px;transform-origin:center;}
  .slide{position:relative;width:1080px;height:1080px;overflow:hidden;color:var(--ink);
    font-family:'Clash Display','DM Sans',sans-serif;background:#060a12;isolation:isolate;}
  /* layer 0: brand gradient тАФ color + depth */
  .s-grad{position:absolute;inset:0;z-index:0;background:
    radial-gradient(ellipse 80% 70% at 70% 22%, rgba(57,232,255,.16), transparent 60%),
    radial-gradient(ellipse 70% 70% at 22% 16%, rgba(168,85,247,.16), transparent 60%),
    radial-gradient(ellipse 90% 80% at 50% 98%, rgba(0,255,153,.07), transparent 62%),
    linear-gradient(155deg,#0b1426 0%,#0a1120 50%,#070c17 100%);}
  /* layer 1: contextual image тАФ faded, desaturated, gives theme */
  .s-photo{position:absolute;inset:0;z-index:1;background-size:cover;background-position:50% 42%;opacity:.42;filter:saturate(.6) contrast(1.03);}
  /* layer 2: scrim for legibility */
  .s-scrim{position:absolute;inset:0;z-index:2;pointer-events:none;background:
    linear-gradient(180deg,rgba(6,10,18,.5) 0%,rgba(6,10,18,.1) 36%,rgba(6,10,18,.14) 60%,rgba(6,10,18,.64) 100%);}
  /* layer 3: dot-matrix тАФ brand signature, on top of the photo */
  .s-dots{position:absolute;inset:0;z-index:3;pointer-events:none;opacity:.26;mix-blend-mode:screen;
    background-image:image-set("hero-dot-matrix-static.avif" 1x type("image/avif"),"hero-dot-matrix-static.webp" 1x type("image/webp"),"hero-dot-matrix-static.png" 1x type("image/png"));
    background-position:50% 0%;background-repeat:no-repeat;background-size:cover;
    -webkit-mask-image:radial-gradient(150% 120% at 74% 12%,#000 0%,#000 30%,rgba(0,0,0,.4) 56%,transparent 78%);
    mask-image:radial-gradient(150% 120% at 74% 12%,#000 0%,#000 30%,rgba(0,0,0,.4) 56%,transparent 78%);
    -webkit-mask-size:100% 100%;mask-size:100% 100%;-webkit-mask-repeat:no-repeat;mask-repeat:no-repeat;}
  .s-frame{position:absolute;z-index:6;inset:34px;border:1px solid rgba(180,205,255,.14);border-radius:6px;pointer-events:none;}
  .s-head{position:absolute;z-index:7;top:56px;left:88px;right:88px;display:flex;justify-content:space-between;align-items:center;
    font-family:'DM Mono',monospace;font-size:18px;letter-spacing:.12em;}
  .s-head .wm{color:#fff;font-weight:500;}
  .s-head .wm sup{color:var(--cyan);font-size:.6em;top:-.55em;}
  .s-head .topic{color:rgba(220,232,255,.62);text-transform:uppercase;}
  .s-title{position:absolute;z-index:7;left:88px;right:96px;top:150px;
    font-weight:600;font-size:74px;line-height:1.05;letter-spacing:-.02em;color:#fff;text-shadow:0 2px 30px rgba(0,0,0,.5);}
  .grad{background:linear-gradient(105deg,#39e8ff,#00ff99 52%,#a855f7);-webkit-background-clip:text;background-clip:text;color:transparent;
    filter:saturate(1.15) brightness(1.1) drop-shadow(0 0 22px rgba(57,232,255,.25));}
  .s-kick{font-family:'DM Mono',monospace;font-weight:500;font-size:22px;letter-spacing:.16em;}
  .s-steps{position:absolute;z-index:7;left:104px;right:96px;top:404px;bottom:188px;display:flex;flex-direction:column;justify-content:space-between;
    border-left:3px solid transparent;border-image:linear-gradient(180deg,#39e8ff,#00ff99,#a855f7) 1;filter:drop-shadow(0 0 10px rgba(0,255,153,.25));}
  .s-step{display:flex;gap:22px;align-items:baseline;padding-left:28px;}
  .s-num{font-family:'DM Mono',monospace;font-size:26px;color:var(--dim);letter-spacing:.05em;min-width:42px;}
  .s-stext{font-family:'DM Sans',sans-serif;font-size:38px;font-weight:500;color:#eaf2ff;line-height:1.12;}
  .s-glyphs{position:absolute;z-index:7;left:88px;right:88px;top:838px;display:flex;align-items:center;gap:22px;font-family:'DM Mono',monospace;}
  .s-glyphs .g{font-size:58px;color:var(--cyan);filter:drop-shadow(0 0 16px rgba(57,232,255,.45));line-height:1;}
  .s-glyphs .arr{font-size:30px;color:var(--dim);}
  .s-glyphs .gl{margin-left:14px;font-size:22px;letter-spacing:.06em;color:var(--muted);}
  .s-half{position:absolute;left:0;right:0;z-index:1;background-size:cover;background-position:50% 50%;}
  .s-half.top{top:0;height:540px;filter:grayscale(1) contrast(1.03);opacity:.36;}
  .s-half.bot{top:540px;bottom:0;filter:saturate(.7) contrast(1.03);opacity:.5;}
  .s-cdiv{position:absolute;z-index:5;left:0;right:0;top:539px;height:2px;background:linear-gradient(90deg,#39e8ff,#00ff99,#a855f7);box-shadow:0 0 18px rgba(0,255,153,.5);}
  .s-cscrim{position:absolute;inset:0;z-index:2;pointer-events:none;background:
    linear-gradient(180deg,rgba(6,10,18,.58) 0%,rgba(6,10,18,.14) 26%,rgba(6,10,18,.14) 66%,rgba(6,10,18,.7) 100%);}
  .s-portrait{position:absolute;z-index:7;left:88px;bottom:120px;width:120px;height:120px;border-radius:50%;object-fit:cover;border:2px solid rgba(120,200,255,.5);box-shadow:0 0 30px rgba(57,232,255,.25);}
  .s-contact{position:absolute;z-index:7;left:232px;right:88px;bottom:120px;font-family:'DM Mono',monospace;}
  .s-contact .nm{font-family:'Clash Display',sans-serif;font-weight:600;font-size:34px;color:#fff;}
  .s-contact .role{font-size:19px;color:var(--muted);margin-top:4px;letter-spacing:.04em;}
  .s-contact .cta{font-size:22px;color:#eaf2ff;margin-top:16px;}
</style>
<style id="sed-style">
  /* ---- slides on-canvas editor (never built on the headless render path) ---- */
  body.sed-on{overflow:hidden;display:flex;align-items:center;justify-content:center;height:100vh;

  body.sed-on .stage-wrap{display:none;}

  #sed-grid .sed-editing{outline:1.5px dashed rgba(57,232,255,.85);outline-offset:3px;cursor:text;}

  #sed-pop{position:fixed;z-index:300;left:20px;bottom:34px;min-width:230px;max-width:340px;background:rgba(8,13,26,.96);

  .sedp-chip{width:24px;height:24px;border-radius:6px;border:1px solid rgba(180,205,255,.3);cursor:pointer;padding:0;
    background:linear-gradient(150deg,#0b1426,#070c17);color:#9fb0d0;font-family:'DM Mono',monospace;font-size:10px;}
  .sedp-chip.sel{outline:2px solid var(--cyan);outline-offset:1px;color:#fff;}
  .sedp-btn{font-family:'DM Mono',monospace;font-size:11px;color:#eef4ff;background:rgba(120,160,230,.1);
    border:1px solid rgba(120,160,230,.3);border-radius:7px;padding:5px 9px;cursor:pointer;}
  .sedp-btn:hover{border-color:var(--cyan);}
  #sed-pop input[type=text]{flex:1;font-family:'DM Mono',monospace;font-size:11px;color:#eef4ff;background:rgba(6,10,18,.8);
    border:1px solid rgba(120,160,230,.25);border-radius:7px;padding:5px 8px;outline:none;min-width:130px;}
  #sed-pop input[type=text]:focus{border-color:var(--cyan);}
  .sedp-hint{margin-top:8px;font-size:10px;color:#6b7da0;line-height:1.5;}
  /* bottom bar тАФ same system as the Studio schedule bar */
  #sed-bar{position:fixed;left:0;right:0;bottom:0;z-index:250;display:flex;align-items:center;gap:10px;
    padding:20px 26px 14px;background:rgba(6,10,19,.9);-webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);
    border-top:1px solid rgba(180,205,255,.14);transform:translateY(calc(100% - 14px));transition:transform .25s ease;}
  #sed-bar:hover,#sed-bar:focus-within{transform:translateY(0);}

  #sed-bar .brand{font-family:'DM Mono',monospace;font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:#fff;margin-right:auto;white-space:nowrap;}
  #sed-bar .brand sup{color:var(--cyan);font-size:.6em;text-transform:none;}
  .sed-btn{display:inline-flex;align-items:center;gap:6px;font-family:'DM Mono',monospace;font-size:12px;letter-spacing:.04em;font-weight:500;
    border:1px solid rgba(120,200,255,.3);background:transparent;color:#9fb0d0;border-radius:10px;

  .sed-btn.primary:hover{filter:brightness(1.1);color:#04121a;}
  #sed-toast{position:fixed;left:50%;top:20px;transform:translateX(-50%) translateY(-8px);z-index:500;font-family:'DM Mono',monospace;font-size:12px;color:#eaf3ff;background:rgba(10,17,32,.94);border:1px solid rgba(120,200,255,.3);border-radius:10px;padding:9px 15px;opacity:0;pointer-events:none;transition:.25s;}
  #sed-toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>

<body>
<div class="stage-wrap"><div class="stage" id="stage"><div class="slide" id="slide"></div></div></div>
<script>
const SIDE=1080;
function fit(){const s=Math.min(innerWidth,innerHeight)/SIDE;stage.style.transform='translate(-50%,-50%) scale('+s+')';}
addEventListener('resize',fit);fit();
const PH=['radial-gradient(70% 60% at 72% 30%, rgba(255,176,80,.5), transparent 55%),radial-gradient(90% 80% at 25% 75%, rgba(57,232,255,.35), transparent 60%),linear-gradient(150deg,#0a1626,#05080f)','radial-gradient(60% 55% at 30% 28%, rgba(168,85,247,.5), transparent 55%),radial-gradient(80% 70% at 80% 80%, rgba(0,255,153,.3), transparent 60%),linear-gradient(150deg,#0c1020,#05080f)','radial-gradient(70% 60% at 60% 40%, rgba(255,150,70,.55), transparent 55%),linear-gradient(150deg,#101622,#06080e)','radial-gradient(80% 70% at 70% 25%, rgba(57,232,255,.4), transparent 58%),radial-gradient(60% 60% at 20% 85%, rgba(255,176,80,.35), transparent 60%),linear-gradient(150deg,#0a1322,#05080f)'];
function bgVal(b){ if(typeof b==='string'&&b) return "url('"+b+"')"; if(typeof b==='number') return PH[b%PH.length]; return PH[0]; }
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;');}
function withHL(t,hl){if(!hl)return esc(t);return esc(t).replace(esc(hl),'<span class="grad">'+esc(hl)+'</span>');}

// renderSlide(slide, topic): the headless driver (slides.mjs) calls this per slide.
// slide.bg = image url/dataURL (A/B/contact). slide.bgTop / slide.bgBot for C. Missing => placeholder.
function renderSlideInto(el, s, topic){
  let h='';
  if(s.type==='C'){
    h+='<div class="s-grad"></div>';
    h+='<div class="s-half top" style="background-image:'+bgVal(s.bgTop!=null?s.bgTop:s.bg)+'"></div>';
    h+='<div class="s-half bot" style="background-image:'+bgVal(s.bgBot!=null?s.bgBot:(typeof s.bg==="number"?s.bg+1:s.bg))+'"></div>';
    h+='<div class="s-cscrim"></div><div class="s-dots"></div><div class="s-cdiv"></div>';
  } else {
    h+='<div class="s-grad"></div><div class="s-photo" style="background-image:'+bgVal(s.bg)+'"></div><div class="s-scrim"></div><div class="s-dots"></div>';
  }
  h+='<div class="s-frame"></div>';
  h+='<div class="s-head"><span class="wm">Pietro<sup>.works</sup></span><span class="topic">'+esc(topic||'')+'</span></div>';
  if(s.type==='A'){
    h+='<div class="s-title">'+withHL(s.title[0],null)+'<br>'+withHL(s.title[1],s.hl)+'</div>';
    h+='<div class="s-steps">';
    (s.steps||[]).forEach((t,i)=>{h+='<div class="s-step"><span class="s-num">0'+(i+1)+'</span><span class="s-stext">'+esc(t)+'</span></div>';});
    h+='</div>';
  } else if(s.type==='B'){
    h+='<div class="s-title">'+withHL(s.hero[0],s.hl)+'<br><span style="color:#cdd8ee">'+withHL(s.hero[1],s.hl)+'</span></div>';
    h+='<div class="s-glyphs">';
    (s.glyphs||[]).forEach((g,i)=>{h+='<span class="g">'+esc(g)+'</span>'+(i<s.glyphs.length-1?'<span class="arr">тЖТ</span>':'');});
    if(s.glabel) h+='<span class="gl">'+esc(s.glabel)+'</span>'; h+='</div>';
  } else if(s.type==='C'){
    h+='<div class="s-title" style="top:150px"><div class="s-kick" style="color:var(--muted)">BEFORE</div>'+esc(s.before).replace(/\n/g,'<br>')+'</div>';
    h+='<div class="s-title" style="top:600px"><div class="s-kick" style="color:var(--green)">AFTER</div>'+withHL(s.after,s.hl).replace(/\n/g,'<br>')+'</div>';
  } else if(s.type==='contact'){
    h+='<div class="s-title">'+withHL(s.line[0],s.hl)+'<br>'+withHL(s.line[1],s.hl)+'</div>';
    h+='<img class="s-portrait" src="pietro-portrait.png" alt=""/>';
    h+='<div class="s-contact"><div class="nm">'+esc(s.name)+'</div><div class="role">'+esc(s.role)+'</div><div class="cta">'+esc(s.cta)+'</div></div>';
  }
  el.innerHTML=h;
}
function renderSlide(s, topic){ renderSlideInto(document.getElementById('slide'), s, topic); }
window.renderSlide=renderSlide;

// count the distinct visual line-boxes a set of nodes occupies, via Range.getClientRects()
// deduped by rounded top. Robust to the inline .grad gradient span, which puts several
// rects on one line. This is the slides mirror of news.html's lineBoxCount.
function lineBoxTops(nodes,set){
  for(const n of nodes){ const r=document.createRange(); r.selectNodeContents(n);
    for(const rect of r.getClientRects()){ if(rect.width>0) set.add(Math.round(rect.top)); } }
  return set;
}

// strayWordLines(el, skipSel): the shared stray-word guard, identical across news.html,
// slides.html and article.html. Maps every word in the block to its visual line (a Range
// rect top) and, once the block wraps to >=2 lines, counts lines that hold a single word.
// A one-line block cannot strand a word, so it returns 0. skipSel excludes label chrome
// (slides' .s-kick BEFORE/AFTER and .s-num step numbers); pure-punctuation tokens are ignored.
function strayWordLines(el, skipSel){
  if(!el) return 0;
  const counts = new Map();
  const walker = document.createTreeWalker(el, NodeFilter.SHOW_TEXT, {
    acceptNode: function(n){
      if(skipSel && n.parentElement && n.parentElement.closest(skipSel)) return NodeFilter.FILTER_REJECT;
      return NodeFilter.FILTER_ACCEPT;
    }
  });
  let node;
  while(node = walker.nextNode()){
    const re = /\S+/g; let m;
    while(m = re.exec(node.nodeValue)){
      if(!/[\p{L}\p{N}]/u.test(m[0])) continue;
      const r = document.createRange(); r.setStart(node, m.index); r.setEnd(node, m.index + m[0].length);
      const tops = new Set();
      for(const rect of r.getClientRects()){ if(rect.width > 0) tops.add(Math.round(rect.top)); }
      // a word that wraps (a hyphenated compound like "one-afternoon") belongs to EVERY line it
      // touches, so its continuation counts toward that line instead of leaving a neighbour looking alone
      tops.forEach(function(t){ counts.set(t, (counts.get(t) || 0) + 1); });
    }
  }
  if(counts.size < 2) return 0;
  let stray = 0; counts.forEach(function(c){ if(c === 1) stray++; });
  return stray;
}

// measureFit(): the layout-derived disposition check slides.mjs reads under --check-fit.
// Named measureFit (not measureSlideFit) to match news.html/article.html: every template
// exposes window.measureFit and every driver has a fitVerdict, a uniform contract. The slides
// renderer has no auto-fit (fixed sizes, hardcoded <br> breaks), so this is measure-only.
//   hlLines    = visual lines the .grad gradient accent crosses, unioned across every .grad
//                span so a wrapped accent counts once per line, not once per rect.
//   titleLines = per title/hero (.s-title), the visual line count of its text. Measured over the
//                title's child nodes individually, skipping the block-level .s-kick label that
//                C's BEFORE/AFTER blocks carry. A Range spanning that block boundary would
//                otherwise pick up a phantom block-box rect and overcount by one line.
//   stray      = labels of wrapped blocks that strand a lone word on a line (uniform field,
//                shared shape with news/article); empty when clean.
// The rule: the gradient hl accent stays within 2 lines, no title/hero breaks past 2 lines,
// and no wrapped block (title, hero, C before/after, A step) strands a single word.
window.measureFit = function(){
  const grads=[...document.querySelectorAll('.grad')];
  const hlLines=grads.length ? lineBoxTops(grads,new Set()).size : 0;
  const titleLines=[...document.querySelectorAll('.s-title')].map(function(t){
    const parts=[...t.childNodes].filter(function(n){
      return !(n.nodeType===1 && n.classList && n.classList.contains('s-kick'));
    });
    return lineBoxTops(parts,new Set()).size;
  });
  const stray=[];
  [...document.querySelectorAll('.s-title')].forEach(function(t,i){ if(strayWordLines(t,'.s-kick')>0) stray.push('title'+(i+1)); });
  [...document.querySelectorAll('.s-step')].forEach(function(s,i){ if(strayWordLines(s,'.s-num')>0) stray.push('step'+(i+1)); });
  return { hlLines:hlLines, titleLines:titleLines, titleMax:titleLines.length?Math.max.apply(null,titleLines):0, stray:stray };
};

// standalone preview: load slides.json if present, else a built-in sample. ?card=N picks a slide.
const SAMPLE={topic:'IN_THE_LOOP.MD',slides:[
 {type:'A',bg:0,title:['Off data entry,','onto review.'],hl:'onto review.',steps:['Capture at the source','Route under tight rules','A human approves every record']},
 {type:'B',bg:1,hero:['The verifier,','not the typist.'],hl:'The verifier,',glyphs:['тЧЛ','тЧЖ','тЧО'],glabel:'the human decides'},
 {type:'C',bg:2,before:'You type every entry.',after:'You approve every entry.',hl:'approve'},
 {type:'contact',bg:3,line:['Build the private tools','your team wishes existed.'],hl:'wishes existed.',name:'Pietro Impagliazzo',role:'AI Workflow Architect',cta:'Drop me a DM ┬╖ amazing@pietro.works'}
]};
(async function(){
  let deck=SAMPLE;
  try{ const r=await fetch('slides.json'); if(r.ok) deck=await r.json(); }catch(e){}
  window.__deck=deck;
  const cp=(location.search.match(/[?&]card=(\d+)/)||[])[1];
  const n=cp!=null?Math.max(0,Math.min(deck.slides.length-1,parseInt(cp,10))):0;
  renderSlide(deck.slides[n], deck.topic);
})();
</script>
<script>
/* ============================================================================
   Slides on-canvas editor. No-op on the headless render path (?headless,
   webdriver, HeadlessChrome) тАФ slides.mjs drives renderSlide/#slide untouched.
   Editor mode lays the four deck slides out 2x2 (1-2 top, 3-4 bottom), text is
   edited by clicking it, glyphs cycle on click, the slide popup handles
   backgrounds and the gradient accent, and the bottom bar matches the Studio
   schedule bar (full-width, slide-up on hover).
   ========================================================================== */
(function(){
  var params=new URLSearchParams(location.search);
  var HEADLESS=params.has('headless')||navigator.webdriver===true||/\bHeadless/.test(navigator.userAgent||'');
  if(HEADLESS)return;
  if(params.has('card'))return;   // explicit single-card preview keeps the old behaviour

  var clone=function(o){return JSON.parse(JSON.stringify(o));};
  var GLYPHS=['тЧЛ','тЧЖ','тЧО','тЧП','тЧЗ','тЦб','тЦа','тЦ▓','тЦ│','тЬж','тЪЩ','тЧЙ'];
  var D=null;   // deck state

  // ---- shell -----------------------------------------------------------------
  document.body.classList.add('sed-on');
  var grid=document.createElement('div');grid.id='sed-grid';document.body.appendChild(grid);
  var cells=[];
  function buildCells(n){
    grid.innerHTML='';cells=[];
    for(var i=0;i<n;i++){
      var cell=document.createElement('div');cell.className='sed-cell';
      var sl=document.createElement('div');sl.className='slide sed-slide';sl.dataset.i=i;
      cell.appendChild(sl);grid.appendChild(cell);cells.push({cell:cell,slide:sl});
    }
  }
  function fit(){
    var n=cells.length||4;
    var cols=2,rows=Math.ceil(n/2);
    var barPeek=18,gap=14;
    var k=Math.min((innerWidth-2*24-(cols-1)*gap)/(cols*1080),(innerHeight-2*20-barPeek-(rows-1)*gap)/(rows*1080));
    if(!(k>0)||!isFinite(k))k=.3;
    cells.forEach(function(c){
      c.cell.style.width=(1080*k)+'px';c.cell.style.height=(1080*k)+'px';
      c.slide.style.transform='scale('+k+')';
    });
    grid.style.gap=gap+'px';
  }
  addEventListener('resize',fit);

  function render(i){
    if(i==null){D.slides.forEach(function(s,ix){renderSlideInto(cells[ix].slide,s,D.topic);});}
    else renderSlideInto(cells[i].slide,D.slides[i],D.topic);
    fitHints();
  }
  // per-slide fit hints (same rule as measureFit: accent <=2 lines, title <=2, no stray word)
  function fitHints(){
    var bad=false;
    cells.forEach(function(c,ix){
      c.slide.querySelectorAll('.sed-over').forEach(function(n){n.classList.remove('sed-over');});
      var grads=[...c.slide.querySelectorAll('.grad')];
      if(grads.length&&lineBoxTops(grads,new Set()).size>2){grads.forEach(function(g){g.parentElement.classList.add('sed-over');});bad=true;}
      c.slide.querySelectorAll('.s-title').forEach(function(t){
        var parts=[...t.childNodes].filter(function(n){return !(n.nodeType===1&&n.classList&&n.classList.contains('s-kick'));});
        if(lineBoxTops(parts,new Set()).size>2||strayWordLines(t,'.s-kick')>0){t.classList.add('sed-over');bad=true;}
      });
      c.slide.querySelectorAll('.s-step').forEach(function(st){ if(strayWordLines(st,'.s-num')>0){st.classList.add('sed-over');bad=true;} });
    });
    if(bad&&!fitHints._w){fitHints._w=true;toast('red dashes = accent/title past 2 lines or a stranded word');}
  }

  // ---- text helpers ----------------------------------------------------------
  function linesOf(el,skipSel){
    var out=[''];
    (function walk(n){
      for(var i=0;i<n.childNodes.length;i++){var c=n.childNodes[i];
        if(c.nodeType===3)out[out.length-1]+=c.nodeValue;
        else if(c.tagName==='BR')out.push('');
        else if(!(skipSel&&c.matches&&c.matches(skipSel)))walk(c);}
    })(el);
    return out.map(function(t){return t.replace(/\s+/g,' ').trim();}).filter(function(t,ix,a){return !(t===''&&ix===a.length-1);});
  }
  function keepHl(s,fields){
    if(!s.hl)return;
    var joined=fields.join('\n');
    if(joined.indexOf(s.hl)<0){s.hl='';toast('accent cleared тАФ reset it in the slide popup');}
  }

  // ---- inline editing --------------------------------------------------------
  var editing=null;
  function commitEdit(){
    if(!editing)return;
    var el=editing.el,b=editing.bind;editing=null;
    el.classList.remove('sed-editing');el.removeAttribute('contenteditable');
    var s=D.slides[b.i];
    if(b.k==='topic'){D.topic=el.textContent.trim();render();return;}
    if(b.k==='title'){
      var L=linesOf(el);
      if(s.type==='A'){s.title=[L[0]||'',L.slice(1).join(' ')||''];keepHl(s,s.title);}
      else if(s.type==='B'){s.hero=[L[0]||'',L.slice(1).join(' ')||''];keepHl(s,s.hero);}
      else if(s.type==='contact'){s.line=[L[0]||'',L.slice(1).join(' ')||''];keepHl(s,s.line);}
      else if(s.type==='C'){
        var v=linesOf(el,'.s-kick').join('\n');
        if(b.which==='before')s.before=v;else{s.after=v;keepHl(s,[s.after]);}
      }
    }
    else if(b.k==='step'){s.steps[b.j]=el.textContent.trim();}
    else if(b.k==='glabel'){s.glabel=el.textContent.trim();}
    else if(b.k==='nm'){s.name=el.textContent.trim();}
    else if(b.k==='role'){s.role=el.textContent.trim();}
    else if(b.k==='cta'){s.cta=el.textContent.trim();}
    render(b.i);
  }
  function cancelEdit(){if(!editing)return;var i=editing.bind.i;editing=null;render(i);}
  function startEdit(el,bind,ev){
    commitEdit();closePop();
    editing={el:el,bind:bind};
    el.setAttribute('contenteditable','true');el.classList.add('sed-editing');el.focus();
    try{var r=document.caretRangeFromPoint(ev.clientX,ev.clientY);
      if(r){var sl=getSelection();sl.removeAllRanges();sl.addRange(r);}}catch(e){}
    el.addEventListener('blur',function onb(){el.removeEventListener('blur',onb);commitEdit();});
    el.addEventListener('keydown',function(e){
      if(e.key==='Enter'&&bind.k!=='title'){e.preventDefault();el.blur();}
      if(e.key==='Escape'){e.preventDefault();cancelEdit();}
    });
  }

  // ---- click routing ---------------------------------------------------------
  grid.addEventListener('click',function(e){
    if(editing&&editing.el.contains(e.target))return;
    if(editing)commitEdit();
    var slideEl=e.target.closest('.sed-slide');if(!slideEl)return;
    var i=Number(slideEl.dataset.i),s=D.slides[i],t=e.target;
    var g=t.closest('.s-glyphs .g');
    if(g){var gi=[...slideEl.querySelectorAll('.s-glyphs .g')].indexOf(g);
      s.glyphs[gi]=GLYPHS[(GLYPHS.indexOf(s.glyphs[gi])+1)%GLYPHS.length];render(i);return;}
    var gl=t.closest('.s-glyphs .gl'); if(gl){startEdit(gl,{k:'glabel',i:i},e);return;}
    var tp=t.closest('.s-head .topic'); if(tp){startEdit(tp,{k:'topic',i:i},e);return;}
    var nm=t.closest('.s-contact .nm'); if(nm){startEdit(nm,{k:'nm',i:i},e);return;}
    var ro=t.closest('.s-contact .role'); if(ro){startEdit(ro,{k:'role',i:i},e);return;}
    var ct=t.closest('.s-contact .cta'); if(ct){startEdit(ct,{k:'cta',i:i},e);return;}
    var st=t.closest('.s-stext'); if(st){var j=[...slideEl.querySelectorAll('.s-stext')].indexOf(st);startEdit(st,{k:'step',i:i,j:j},e);return;}
    var ti=t.closest('.s-title');
    if(ti){var bind={k:'title',i:i};
      if(s.type==='C'){var kick=ti.querySelector('.s-kick');bind.which=(kick&&/BEFORE/i.test(kick.textContent))?'before':'after';}
      startEdit(ti,bind,e);return;}
    popSlide(i,e);
  });

  // ---- popup (docked bottom-left, above the bar peek) ------------------------
  var pop=document.createElement('div');pop.id='sed-pop';document.body.appendChild(pop);
  function closePop(){pop.classList.remove('open');pop.innerHTML='';}
  function openPop(title){
    pop.innerHTML='';pop.classList.add('open');
    var h=document.createElement('h4');h.innerHTML='<span>'+title+'</span>';
    var x=document.createElement('span');x.className='x';x.textContent='тЬХ';x.onclick=closePop;h.appendChild(x);
    pop.appendChild(h);
  }
  function row(label){var r=document.createElement('div');r.className='sedp-row';
    if(label){var l=document.createElement('span');l.className='sedp-lab';l.textContent=label;r.appendChild(l);}
    pop.appendChild(r);return r;}
  function bgRow(label,get,set,i){
    var r=row(label);
    for(var pIx=0;pIx<4;pIx++)(function(px){
      var b=document.createElement('button');b.type='button';b.className='sedp-chip';b.textContent=px+1;
      b.title='brand placeholder '+(px+1);
      if(get()===px)b.classList.add('sel');
      b.onclick=function(){set(px);render(i);popSlide(i);};
      r.appendChild(b);
    })(pIx);
    var fi=document.createElement('input');fi.type='file';fi.accept='image/*';fi.style.display='none';
    fi.onchange=function(ev){var f=ev.target.files&&ev.target.files[0];fi.value='';if(!f)return;
      var rd=new FileReader();rd.onload=function(){set(rd.result);render(i);toast('image set тАФ exports inline; swap for a backgrounds/ path before the pipeline run');};rd.readAsDataURL(f);};
    r.appendChild(fi);
    var cb=document.createElement('button');cb.type='button';cb.className='sedp-btn';cb.textContent='imageтАж';
    cb.onclick=function(){fi.click();};r.appendChild(cb);
  }
  function popSlide(i,e){
    var s=D.slides[i];
    openPop('slide '+(i+1)+' ┬╖ type '+s.type);
    if(s.type==='C'){
      bgRow('bg top',function(){return typeof s.bgTop==='number'?s.bgTop:-1;},function(v){s.bgTop=v;},i);
      bgRow('bg bottom',function(){return typeof s.bgBot==='number'?s.bgBot:-1;},function(v){s.bgBot=v;},i);
    } else {
      bgRow('background',function(){return typeof s.bg==='number'?s.bg:-1;},function(v){s.bg=v;},i);
    }
    var r=row('accent');
    var inp=document.createElement('input');inp.type='text';inp.value=s.hl||'';inp.spellcheck=false;
    inp.placeholder='exact phrase to paint with the gradient';
    inp.oninput=function(){s.hl=inp.value;render(i);};
    r.appendChild(inp);
    var hint=document.createElement('div');hint.className='sedp-hint';
    hint.textContent='must match text on the slide exactly ┬╖ click any text on the canvas to edit it';
    pop.appendChild(hint);
  }
  document.addEventListener('mousedown',function(e){
    if(pop.contains(e.target)||grid.contains(e.target)||bar.contains(e.target))return;
    closePop();
  });
  document.addEventListener('keydown',function(e){if(e.key==='Escape')closePop();});

  // ---- bottom bar (uniform with the Studio schedule bar) ---------------------
  var bar=document.createElement('div');bar.id='sed-bar';
  var brand=document.createElement('span');brand.className='brand';brand.innerHTML='Pietro<sup>.works</sup> тАФ slides editor';bar.appendChild(brand);
  var loadInput=document.createElement('input');loadInput.type='file';loadInput.accept='application/json,.json';loadInput.style.display='none';
  loadInput.addEventListener('change',function(e){
    var f=e.target.files&&e.target.files[0];loadInput.value='';if(!f)return;
    var r=new FileReader();
    r.onload=function(){try{
      var d=JSON.parse(r.result);
      if(!d||!Array.isArray(d.slides)||!d.slides.length)throw new Error('no slides[] in file');
      D=d;buildCells(D.slides.length);fit();render();toast('loaded '+f.name);
    }catch(err){toast('could not read deck: '+err.message);}};
    r.readAsText(f);
  });
  bar.appendChild(loadInput);
  function bbtn(label,fn,cls){var b=document.createElement('button');b.type='button';b.className='sed-btn'+(cls?' '+cls:'');b.textContent=label;b.onclick=fn;return b;}
  bar.appendChild(bbtn('Load .json',function(){loadInput.click();}));
  bar.appendChild(bbtn('Copy JSON',copyJson,'primary'));
  bar.appendChild(bbtn('Download .json',downloadJson));
  bar.appendChild(bbtn('Render тЖТ posts',function(){
    toast('rendering deck to dispatch-postsтАж');
    fetch('/api/render',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({kind:'slides',spec:D})})
      .then(function(r){return r.json();}).then(function(d){toast(d.ok?('wrote '+d.files.join(' + ')):('render failed: '+(d.error||d.log||'').slice(-160)));})
      .catch(function(){toast('needs the Studio server тАФ open via Studio.command');});
  }));
  bar.appendChild(bbtn('Reset',function(){D=clone(window.__deck||SAMPLE);buildCells(D.slides.length);fit();render();closePop();toast('reset to the loaded deck');}));
  document.body.appendChild(bar);

  var toastEl=document.createElement('div');toastEl.id='sed-toast';document.body.appendChild(toastEl);
  function toast(m){toastEl.textContent=m;toastEl.classList.add('show');
    clearTimeout(toastEl._t);toastEl._t=setTimeout(function(){toastEl.classList.remove('show');},2200);}

  function deckJson(){return JSON.stringify(D,null,2);}
  function copyJson(){
    var t=deckJson();
    if(navigator.clipboard&&navigator.clipboard.writeText)
      navigator.clipboard.writeText(t).then(function(){toast('deck JSON copied');},function(){toast('copy failed тАФ use Download .json');});
    else toast('copy failed тАФ use Download .json');
  }
  function downloadJson(){
    var b=new Blob([deckJson()],{type:'application/json'});
    var a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='slides.json';
    document.body.appendChild(a);a.click();a.remove();
    setTimeout(function(){URL.revokeObjectURL(a.href);},4000);toast('slides.json downloaded');
  }

  // ---- boot ------------------------------------------------------------------
  (async function(){
    var deck=SAMPLE;
    try{var r=await fetch('slides.json');if(r.ok)deck=await r.json();}catch(e){}
    window.__deck=deck;
    D=clone(deck);
    buildCells(D.slides.length);fit();render();
    if(document.fonts&&document.fonts.ready)document.fonts.ready.then(function(){fit();render();});
  })();

  window.__slidesEditor={get deck(){return D;},render:render};
})();
</script>
<script>
// floating back-to-Studio arrow тАФ editor/preview chrome only, never on the render path
(function(){
  if(new URLSearchParams(location.search).has('headless')||navigator.webdriver===true||/\bHeadless/.test(navigator.userAgent||''))return;
  if(location.protocol!=='http:'&&location.protocol!=='https:')return;
  var a=document.createElement('a');a.id='pw-back';a.href='/';a.title='Back to Studio';a.textContent='\u2190';
  a.style.cssText="position:fixed;top:16px;left:16px;z-index:600;width:40px;height:40px;display:flex;align-items:center;justify-content:center;font:500 17px/1 'DM Mono',monospace;color:#9fb0d0;text-decoration:none;background:rgba(6,10,19,.72);border:1px solid rgba(120,200,255,.3);border-radius:50%;-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);transition:.15s;";
  a.onmouseenter=function(){a.style.color='#04121a';a.style.background='#39e8ff';a.style.borderColor='#39e8ff';};
  a.onmouseleave=function(){a.style.color='#9fb0d0';a.style.background='rgba(6,10,19,.72)';a.style.borderColor='rgba(120,200,255,.3)';};
  document.body.appendChild(a);
})();
</script>
