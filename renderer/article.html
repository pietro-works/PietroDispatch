<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Pietro.works — Article Banner Generator</title>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<style id="clash-display-faces">
@font-face {
  font-family: 'Clash Display';
  src: url('https://cdn.fontshare.com/wf/2GQIT54GKQY3JRFTSHS4ARTRNRQISSAA/3CIP5EBHRRHE5FVQU3VFROPUERNDSTDF/JTSL5QESUXATU47LCPUNHZQBDDIWDOSW.woff2') format('woff2');
  font-weight: 500; font-display: swap; font-style: normal;
}
@font-face {
  font-family: 'Clash Display';
  src: url('https://cdn.fontshare.com/wf/FPDAZ2S6SW4QMSRIIKNNGTPM6VIXYMKO/5HNPQ453FRLIQWV2FNOBUU3FKTDZQVSG/Z3MGHFHX6DCTLQ55LJYRJ5MDCZPMFZU6.woff2') format('woff2');
  font-weight: 600; font-display: swap; font-style: normal;
}
@font-face {
  font-family: 'Clash Display';
  src: url('https://cdn.fontshare.com/wf/BFBSY7LX5W2U2EROCLVVTQP4VS7S4PC3/IIUX4FGTMD2LK2VWD3RVTAS4SSMUN7B5/53RZKGODFYDW3QHTIL7IPOWTBCSUEZK7.woff2') format('woff2');

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,300;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  :root{
    /* dark spectrum — cinematic, same base as news.html */
    --bg:#060a12; --bg2:#0a0f1e; --bg3:#0e1525;
    --ink:#eef4ff; --muted:#9fb0d0; --dim:#6b7da0;
    --line:rgba(120,160,230,.16); --line-s:rgba(120,160,230,.30);
    --cyan:#39e8ff; --green:#00ff99; --pink:#c084fc; --purple:#a855f7;
    --cat:var(--cyan);                /* per-category accent, set in JS */
    --ease:cubic-bezier(.22,1,.36,1);
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{ height:100%; overflow:hidden; }
  body{
    color:var(--ink);
    font-family:"DM Sans",ui-sans-serif,system-ui,-apple-system,sans-serif;
    background:
      radial-gradient(ellipse 90% 80% at 50% 30%, rgba(20,30,60,.5), transparent 60%),
      linear-gradient(160deg, #05080f 0%, #070b16 56%, #060a12 100%);
  }

  /* ---------- fullscreen stage ---------- */
  .stage-wrap{ position:fixed; inset:0; z-index:1; overflow:hidden; }
  .stage{ position:absolute; top:50%; left:50%; width:1920px; height:1080px; transform-origin:center center; }

  /* ---------- banner canvas (16:9) ---------- */
  .banner{
    position:relative; width:1920px; height:1080px;
    background:var(--bg);
    overflow:hidden; isolation:isolate;
    display:flex; flex-direction:column; justify-content:flex-end;
    padding:88px 104px 84px;
  }

  /* background photo — subject composed right-of-center by the image prompt */
  .banner-bg{
    position:absolute; inset:0; z-index:0;
    background-position:62% 50%; background-size:cover; background-repeat:no-repeat;
    background-image:
      radial-gradient(ellipse 70% 80% at 76% 40%, rgba(57,232,255,.14), transparent 60%),
      radial-gradient(ellipse 50% 60% at 88% 70%, rgba(255,150,60,.10), transparent 62%),
      linear-gradient(115deg, #0b1426 0%, #0a1120 50%, #070c17 100%);
    transition:filter .3s var(--ease);
  }
  /* scrim: a single smooth bottom-up band carries the legibility (concentrated at
     the bottom, gentle falloff, ~10% lighter than a hard scrim). Only a faint left
     wash and top touch remain for depth. */
  .banner-scrim{
    position:absolute; inset:0; z-index:1; pointer-events:none;
    background:
      linear-gradient(0deg,
        rgba(6,10,18,.85) 0%,
        rgba(6,10,18,.73) 15%,
        rgba(6,10,18,.55) 30%,
        rgba(6,10,18,.34) 46%,
        rgba(6,10,18,.16) 62%,
        rgba(6,10,18,.05) 76%,
        rgba(6,10,18,0) 88%),
      linear-gradient(90deg, rgba(6,10,18,.22) 0%, rgba(6,10,18,.07) 32%, rgba(6,10,18,0) 56%),
      linear-gradient(180deg, rgba(6,10,18,.28) 0%, rgba(6,10,18,0) 18%);
  }
  /* dot matrix — brand signature, faint, upper-right */
  .banner-dots{
    position:absolute; inset:0; z-index:2; pointer-events:none;
    opacity:.30; mix-blend-mode:screen;
    background-image:
      image-set("hero-dot-matrix-static.avif" 1x type("image/avif"),
                "hero-dot-matrix-static.webp" 1x type("image/webp"),
                "hero-dot-matrix-static.png" 1x type("image/png"));
    background-position:100% 0%; background-repeat:no-repeat; background-size:cover;
    -webkit-mask-image:radial-gradient(130% 130% at 86% 10%, #000 0%, #000 26%, rgba(0,0,0,.35) 52%, transparent 74%);
    mask-image:radial-gradient(130% 130% at 86% 10%, #000 0%, #000 26%, rgba(0,0,0,.35) 52%, transparent 74%);
    -webkit-mask-size:100% 100%; mask-size:100% 100%;
    -webkit-mask-repeat:no-repeat; mask-repeat:no-repeat;
  }
  /* thin hairline frame, editorial */
  .banner-frame{
    position:absolute; z-index:3; pointer-events:none;
    inset:30px; border:1px solid rgba(180,205,255,.14); border-radius:6px;
  }

  /* corner brand tag (top-left) */
  .banner-kicker{
    position:absolute; z-index:5; top:62px; left:104px;
    display:flex; align-items:center; gap:16px;
    font-family:"DM Mono",monospace; font-size:22px; letter-spacing:.14em; text-transform:uppercase;
    color:rgba(220,232,255,.78);
  }
  .banner-kicker .wm{color:#fff; font-weight:500;}
  .banner-kicker .wm sup{color:var(--cyan); font-size:.6em; top:-.55em;}
  .banner-kicker .live{
    display:inline-flex; align-items:center; gap:10px; letter-spacing:.1em; color:rgba(220,232,255,.6);
  }
  .banner-kicker .live .d{width:10px; height:10px; border-radius:50%; background:var(--green); box-shadow:0 0 12px var(--green);}

  /* drop hint (not exported) */
  .drop-hint{
    position:absolute; z-index:6; inset:0; display:flex; align-items:center; justify-content:center;
    pointer-events:none; opacity:0; transition:opacity .25s;
    font-family:"DM Mono",monospace; font-size:21px; letter-spacing:.04em; color:rgba(220,232,255,.66);
  }
  .banner.drag .drop-hint{opacity:1;}
  .banner.drag .banner-bg{filter:brightness(.7) saturate(.8);}
  .drop-hint span{
    border:1.5px dashed rgba(150,185,255,.5); border-radius:16px; padding:26px 40px;
    background:rgba(8,14,28,.5); -webkit-backdrop-filter:blur(4px); backdrop-filter:blur(4px);
  }

  /* ---------- content block (bottom, extends to the right edge) ---------- */
  .banner-content{ position:relative; z-index:5; display:flex; flex-direction:column; max-width:1712px; }

  /* category pill — same glass pill as news */
  .banner-cat{
    display:inline-flex; align-items:center; gap:14px; align-self:flex-start;
    border:1px solid var(--line-s);
    background:linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.03));
    -webkit-backdrop-filter:blur(10px); backdrop-filter:blur(10px);
    border-radius:999px; padding:14px 26px; margin-bottom:34px;
    box-shadow:inset 0 1px rgba(255,255,255,.18);
    overflow:hidden; isolation:isolate;
    -webkit-mask-image:-webkit-radial-gradient(white, black);
    mask-image:radial-gradient(white, black);
  }
  .banner-cat .c-label{
    font-family:"DM Mono",monospace; font-size:22px; font-weight:500;
    letter-spacing:.16em; text-transform:uppercase; color:#fff;
    white-space:nowrap; outline:none;
  }

  /* headline — 1.2x the news headline, extends across most of the width */
  .banner-headline{
    font-family:"Clash Display","DM Sans",sans-serif;
    font-weight:600; font-size:115px; line-height:1.05; letter-spacing:-.018em;
    color:#fff; text-wrap:balance; max-width:1600px;
    text-shadow:0 3px 44px rgba(0,0,0,.5);
    outline:none;
  }
  .banner-headline:focus-visible,
  .banner-deck:focus-visible,
  .c-label:focus-visible{outline:2px dashed var(--line-s); outline-offset:12px; border-radius:6px;}
  .banner-headline .hl{
    color:transparent;
    background:linear-gradient(105deg, #39e8ff 0%, #00ff99 50%, #a855f7 100%);
    -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;
    filter:saturate(1.2) brightness(1.12) drop-shadow(0 0 30px rgba(57,232,255,.28));
  }

  /* deck — the standfirst line under the headline */
  .banner-deck{
    margin-top:29px; max-width:1200px;
    font-family:"DM Sans",sans-serif; font-weight:400; font-size:38px; line-height:1.42;
    color:rgba(224,232,248,.86); text-wrap:pretty;
    outline:none;
  }
  .banner-deck:empty{display:none;}

  /* footer meta — spans the full content width; brand mark pinned to the right edge */
  .banner-foot{
    display:flex; align-items:center; gap:22px; flex-wrap:nowrap; white-space:nowrap;
    margin-top:43px; padding-top:34px; border-top:1px solid rgba(190,210,255,.20);
    width:100%;
    font-family:"DM Mono",monospace; font-size:24px; letter-spacing:.02em;
  }
  .banner-foot .src{color:#fff; font-weight:500;}
  .banner-foot .sep{color:var(--dim);}
  .banner-foot .date{color:var(--muted);}
  .banner-foot .brand{
    margin-left:auto; display:flex; align-items:center; gap:12px;
    color:rgba(220,232,255,.72);
  }
  .banner-foot .brand .wm{color:#fff;}
  .banner-foot .brand .wm sup{color:var(--cyan); font-size:.6em; top:-.55em;}
  .banner-foot .brand .av{
    width:46px; height:46px; border-radius:50%; object-fit:cover;
    border:2px solid rgba(180,205,255,.45);
  }

  /* ---------- controls / dock ---------- */
  .ctrl-group{
    display:inline-flex; align-items:center; gap:10px;
    border:1px solid var(--line); background:rgba(255,255,255,.05);
    border-radius:999px; padding:7px 16px;
  }
  .ctrl-group label{font-family:"DM Mono",monospace; font-size:12px; color:var(--dim); white-space:nowrap;}
  .meta{font-family:"DM Mono",monospace; color:var(--dim); font-size:13px;}
  input[type=range]{accent-color:var(--cyan); width:120px;}
  input[type=number].q-num-input{
    font-family:"DM Mono",monospace; font-size:15px; font-weight:500;
    color:var(--ink); background:transparent; border:none; outline:none;
    width:42px; text-align:center; -moz-appearance:textfield;
  }
  input[type=number].q-num-input::-webkit-inner-spin-button,
  input[type=number].q-num-input::-webkit-outer-spin-button{-webkit-appearance:none; margin:0;}
  .ctrl-btn{
    display:inline-flex; align-items:center; gap:8px;
    font-family:'DM Mono',monospace; font-size:12px; letter-spacing:.04em; font-weight:500;
    border:1px solid rgba(120,200,255,.3); background:transparent;
    color:#9fb0d0; border-radius:10px; padding:10px 16px; cursor:pointer; transition:.12s;
  }
  .ctrl-btn:hover{color:#eef4ff;border-color:var(--cyan);}
  .ctrl-btn.primary{background:linear-gradient(105deg,var(--cyan),#5fefff); color:#04121a; border:none; font-weight:600;}
  .ctrl-btn.primary:hover{filter:brightness(1.1); color:#04121a;}
  .ctrl-btn.nav{padding:9px 14px; font-size:16px; line-height:1;}
  .ctrl-btn.hl-btn{border-color:rgba(57,232,255,.36); background:rgba(57,232,255,.08); padding:9px 18px;}
  .ctrl-btn.hl-btn:hover{background:rgba(57,232,255,.16);}
  .ctrl-btn.hl-btn .g{
    background:linear-gradient(105deg, #39e8ff, #00ff99 52%, #a855f7);
    -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;
    font-weight:600;
  }

  /* ── glassmorphic dock ── */
  .dock{
    position:fixed; bottom:0; left:0; right:0; z-index:200;
    padding:20px 26px 14px;
    display:flex; align-items:center; justify-content:flex-end; flex-wrap:wrap; gap:8px;
    background:rgba(6,10,19,.9);
    -webkit-backdrop-filter:blur(12px); backdrop-filter:blur(12px);
    border-top:1px solid rgba(180,205,255,.14);
    transform:translateY(calc(100% - 14px));
    transition:transform .3s ease;
  }
  .dock::before{content:'';position:absolute;top:5px;left:50%;transform:translateX(-50%);width:44px;height:3px;border-radius:2px;background:rgba(159,176,208,.4);}
  .dock .pw-brand{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#fff;white-space:nowrap;pointer-events:none;margin-right:auto;}
  .dock .pw-brand sup{color:var(--cyan);font-size:.6em;text-transform:none;}
  /* compact single-row controls, same header shape as the fluxogram/slides bars */
  .dock .ctrl-group{padding:4px 10px;gap:7px;}
  .dock .ctrl-group label{font-size:10px;}
  .dock .meta{font-size:11px;}
  .dock input[type=range]{width:78px;}
  .dock .ctrl-btn{padding:8px 12px;font-size:11px;gap:6px;}
  .dock .ctrl-btn.nav{padding:8px 10px;font-size:13px;}
  .dock.open,.dock:hover{transform:translateY(0);}
</style>
<script src="https://unpkg.com/html-to-image@1.11.13/dist/html-to-image.js"></script>

<body>
  <div class="stage-wrap">
    <div class="stage" id="stage">
      <div class="banner" id="banner" data-screen-label="Article Banner Canvas">
        <div class="banner-bg" id="bannerBg"></div>
        <div class="banner-scrim"></div>
        <div class="banner-dots"></div>
        <div class="banner-frame"></div>

        <div class="banner-kicker">
          <span class="wm">Pietro<sup>.works</sup></span>
          <span class="live"><span class="d"></span> <span id="kickerLabel">ARTICLE</span></span>
        </div>

        <div class="drop-hint"><span>Drop a photo to set the background</span></div>

        <div class="banner-content">
          <div class="banner-cat">
            <span class="c-label" id="catLabel" contenteditable="true" spellcheck="false">ANALYSIS</span>
          </div>
          <div class="banner-headline" id="headline" contenteditable="true" spellcheck="false"></div>
          <div class="banner-deck" id="deck" contenteditable="true" spellcheck="false"></div>
          <div class="banner-foot">
            <span class="src" id="src" contenteditable="true" spellcheck="false">June</span>
            <span class="sep">&middot;</span>
            <span class="date" id="date" contenteditable="true" spellcheck="false">2026</span>
            <span class="brand">
              <img class="av" src="pietro-portrait.png" alt="Pietro Impagliazzo"/>
              <span class="wm">Pietro<sup>.works</sup></span>
            </span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="dock" id="dock">
    <span class="pw-brand">Pietro<sup>.works</sup> — article covers</span>
    <div class="ctrl-group">
      <button class="ctrl-btn nav" id="prevBtn" title="Previous">&#9664;</button>
      <input type="number" class="q-num-input" id="numInput" min="1" max="8" value="1"/>
      <span class="meta" id="totalCount">/ 8</span>
      <button class="ctrl-btn nav" id="nextBtn" title="Next">&#9654;</button>
    </div>
    <div class="ctrl-group">
      <label>size</label>
      <input type="checkbox" id="autoSize" checked title="auto-fit headline"/>
      <label for="autoSize" style="font-family:'DM Mono',monospace;font-size:12px;cursor:pointer;color:var(--muted)">auto</label>
      <input type="range" id="sizeRange" min="64" max="180" step="1" value="134" style="transition:opacity .2s"/>
      <span class="meta" id="sizeVal">auto</span>
    </div>
    <div class="ctrl-group">
      <label>accent</label>
      <button class="ctrl-btn hl-btn" id="accentBtn"><span class="g">&#9672; Apply</span></button>
      <button class="ctrl-btn" id="clearHlBtn">Clear</button>
    </div>
    <button class="ctrl-btn" id="bgBtn">&#128247; Background</button>
    <button class="ctrl-btn" id="resetBtn">&#8635; Reset</button>
    <button class="ctrl-btn primary" id="dlBtn" style="display:none">&#8595; Download PNG</button>
    <span id="actionHint" style="font-family:'DM Mono',monospace;font-size:12px;color:var(--dim);opacity:0;transition:opacity .5s;pointer-events:none;display:inline-block;min-width:90px;text-align:center;"></span>
  </div>
  <input type="file" id="bgFileInput" accept="image/*" style="display:none;"/>

  <script>
    const W = 1920, H = 1080;

    /* category → brand accent (same map as news.html) */
    const CAT_ACCENT = {
      BREAKING:'#39e8ff', ANALYSIS:'#a855f7', INDUSTRY:'#00ff99',
      INSIGHT:'#c084fc', REPORT:'#39e8ff', OPINION:'#ffb86c'
    };
    function applyCatAccent(label){
      const key = (label||'').trim().toUpperCase();
      document.documentElement.style.setProperty('--cat', CAT_ACCENT[key] || '#39e8ff');
    }
    function setKicker(label){
      document.getElementById('kickerLabel').textContent = (label||'ARTICLE').toUpperCase();
    }

    function currentMonthLabel(){
      return new Date().toLocaleDateString('en-US', { month:'long' });
    }
    function currentYearLabel(){
      return String(new Date().getFullYear());
    }

    /* ── stage scaling ── */
    function fit(){
      const s = Math.min(window.innerWidth / W, window.innerHeight / H);
      document.getElementById('stage').style.transform = 'translate(-50%,-50%) scale('+s+')';
    }
    window.addEventListener('resize', fit);
    fit();

    /* ── TSV loader ── */
    let items = [];
    let currentIdx = parseInt(localStorage.getItem('pa-idx') || '0', 10);

    async function loadTSV(){
      try{
        const res = await fetch('article.tsv');
        const text = await res.text();
        const lines = text.trim().split('\n').slice(1);
        items = lines.map(function(line){
          const c = line.split('\t');
          return { id:c[0]||'', category:c[1]||'', headline:c[2]||'', highlight:c[3]||'',
                   deck:c[4]||'', kicker:c[5]||'' };
        });
        document.getElementById('totalCount').textContent = '/ ' + items.length;
        document.getElementById('numInput').max = Math.max(1, items.length);
        if(currentIdx >= items.length) currentIdx = 0;
        render(currentIdx);
      } catch(e){
        console.error('Could not load article.tsv:', e);
        document.getElementById('headline').textContent = 'Could not load article.tsv — serve over HTTP.';
      }
    }

    function escapeHtml(s){
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function render(n){
      if(!items.length) return;
      n = Math.max(0, Math.min(items.length - 1, n));
      currentIdx = n;
      localStorage.setItem('pa-idx', String(n));
      const it = items[n];

      document.getElementById('numInput').value = String(n + 1);
      document.getElementById('catLabel').textContent = it.category || 'ARTICLE';
      applyCatAccent(it.category);
      setKicker(it.kicker);

      const hl = document.getElementById('headline');
      let html = escapeHtml(it.headline);
      if(it.highlight){
        const esc = escapeHtml(it.highlight);
        html = html.replace(esc, '<span class="hl">' + esc + '</span>');
      }
      hl.innerHTML = html;

      document.getElementById('deck').textContent = it.deck || '';
      document.getElementById('src').textContent = currentMonthLabel();
      document.getElementById('date').textContent = currentYearLabel();

      range.value = HEADLINE_CAP;
      fitHeadline();
    }

    /* ── navigation ── */
    document.getElementById('prevBtn').addEventListener('click', function(){ render(currentIdx - 1); });
    document.getElementById('nextBtn').addEventListener('click', function(){ render(currentIdx + 1); });

    const numInput = document.getElementById('numInput');
    numInput.addEventListener('change', function(){
      const v = parseInt(this.value, 10); if(!isNaN(v)) render(v - 1);
    });
    numInput.addEventListener('keydown', function(e){
      if(e.key === 'Enter'){ this.blur(); const v = parseInt(this.value,10); if(!isNaN(v)) render(v - 1); }
      if(e.key === 'ArrowUp'){ e.preventDefault(); render(currentIdx - 1); }
      if(e.key === 'ArrowDown'){ e.preventDefault(); render(currentIdx + 1); }
    });
    document.addEventListener('keydown', function(e){
      if(document.activeElement === numInput) return;
      if(document.activeElement && document.activeElement.isContentEditable) return;
      if(e.key === 'ArrowLeft' || e.key === 'ArrowUp'){ e.preventDefault(); render(currentIdx - 1); }
      if(e.key === 'ArrowRight' || e.key === 'ArrowDown'){ e.preventDefault(); render(currentIdx + 1); }
    });

    /* ── headline auto-fit ── */
    const range = document.getElementById('sizeRange');
    const sizeVal = document.getElementById('sizeVal');
    const autoCheck = document.getElementById('autoSize');

    function updateSliderState(){
      const isAuto = autoCheck.checked;
      range.disabled = isAuto;
      range.style.opacity = isAuto ? '0.35' : '1';
      range.style.pointerEvents = isAuto ? 'none' : 'auto';
    }
    updateSliderState();
    autoCheck.addEventListener('change', function(){ updateSliderState(); range.value = HEADLINE_CAP; fitHeadline(); });

    // bind the final two words so the last line is never one word (same as news.html)
    function bindLastTwoWords(el){
      const walker = document.createTreeWalker(el, NodeFilter.SHOW_TEXT, null);
      const nodes = []; let node;
      while(node = walker.nextNode()) nodes.push(node);
      nodes.forEach(function(t){
        if(t.nodeValue.indexOf('\u00A0') !== -1){ t.nodeValue = t.nodeValue.replace(/\u00A0/g,' '); }
      });
      for(let i = nodes.length - 1; i >= 0; i--){
        const t = nodes[i].nodeValue;
        const idx = t.lastIndexOf(' ');
        if(idx !== -1){
          nodes[i].nodeValue = t.slice(0, idx) + '\u00A0' + t.slice(idx + 1);
          return;
        }
      }
    }

    function lineBoxCount(el){
      const r = document.createRange(); r.selectNodeContents(el);
      const tops = new Set();
      for(const rect of r.getClientRects()){ if(rect.width > 0) tops.add(Math.round(rect.top)); }
      return tops.size || (el.textContent.trim() ? 1 : 0);
    }

    // strayWordLines(el, skipSel): the shared stray-word guard, identical across news.html,
    // slides.html and article.html. Maps every word in the block to its visual line (a Range
    // rect top) and, once the block wraps to >=2 lines, counts lines that hold a single word.
    // A one-line block cannot strand a word, so it returns 0. skipSel excludes label chrome;
    // pure-punctuation tokens are ignored. The nbsp orphan guard binds the headline's LAST line;
    // this catches a lone word stranded on ANY line, and covers the deck, which has no bind.
    function strayWordLines(el, skipSel){
      if(!el) return 0;
      const counts = new Map();
      const walker = document.createTreeWalker(el, NodeFilter.SHOW_TEXT, {
        acceptNode: function(n){
          if(skipSel && n.parentElement && n.parentElement.closest(skipSel)) return NodeFilter.FILTER_REJECT;
          return NodeFilter.FILTER_ACCEPT;
        }
      });
      let node;
      while(node = walker.nextNode()){
        const re = /\S+/g; let m;
        while(m = re.exec(node.nodeValue)){
          if(!/[\p{L}\p{N}]/u.test(m[0])) continue;
          const r = document.createRange(); r.setStart(node, m.index); r.setEnd(node, m.index + m[0].length);
          const tops = new Set();
          for(const rect of r.getClientRects()){ if(rect.width > 0) tops.add(Math.round(rect.top)); }
          // a word that wraps (a hyphenated compound like "one-afternoon") belongs to EVERY line it
          // touches, so its continuation counts toward that line instead of leaving a neighbour looking alone
          tops.forEach(function(t){ counts.set(t, (counts.get(t) || 0) + 1); });
        }
      }
      if(counts.size < 2) return 0;
      let stray = 0; counts.forEach(function(c){ if(c === 1) stray++; });
      return stray;
    }

    // BANNER LAYOUT RULE: the headline occupies at most 2 lines on the wide canvas.
    // Same discipline as news.html (2026-07-17): shrink to fit, floor the size, and
    // let measureFit() report a violation instead of rendering microscopic type.
    // Banner type is sized ~2x a poster so it reads in-feed; the auto cap and floor
    // scale with it. HEADLINE_CAP is the auto-fit starting size and the manual default.
    const HEADLINE_MAXLINES = 2;
    const HEADLINE_CAP = 134;
    const HEADLINE_FLOOR = 80;

    function unbindWords(el){
      const walker = document.createTreeWalker(el, NodeFilter.SHOW_TEXT, null); let node;
      while(node = walker.nextNode()){ if(node.nodeValue.indexOf("\u00A0") !== -1) node.nodeValue = node.nodeValue.split("\u00A0").join(" "); }
    }
    function shrinkToFit(hl, content, cap){
      let size = cap, guard = 0; const maxH = 840;
      hl.style.fontSize = size + 'px';
      while(size > HEADLINE_FLOOR && guard < 400 &&
            (content.scrollHeight > maxH || lineBoxCount(hl) > HEADLINE_MAXLINES)){
        size--; hl.style.fontSize = size + 'px'; guard++;
      }
      return size;
    }

    function fitHeadline(){
      const hl = document.getElementById('headline');
      const content = document.querySelector('.banner-content');
      const canvas = document.getElementById('banner');
      if(!hl || !content || !canvas) return;
      if(document.activeElement !== hl) bindLastTwoWords(hl);
      const cap = autoCheck.checked ? HEADLINE_CAP : parseInt(range.value, 10);
      let size = shrinkToFit(hl, content, cap);
      if(lineBoxCount(hl) > HEADLINE_MAXLINES){
        unbindWords(hl);
        size = shrinkToFit(hl, content, cap);
      }
      sizeVal.textContent = autoCheck.checked ? 'auto' : size + 'px';
      if(!autoCheck.checked) range.value = size;
    }

    // measureFit(): layout-derived fit metrics for the render pipeline (article.mjs).
    // Rules enforced downstream: headline 1-2 lines; deck 0-2 lines (empty allowed);
    // when the deck renders 2 lines its second line should not be a stub.
    window.measureFit = function(){
      const hl = document.getElementById('headline');
      const dk = document.getElementById('deck');
      const out = { headlineLines: 0, headlineSize: null, deckLines: 0, deckFill: 0, deckWidth: 0, stray: [] };
      if(hl){ out.headlineLines = lineBoxCount(hl); out.headlineSize = Math.round(parseFloat(getComputedStyle(hl).fontSize)); }
      if(dk){
        const r = document.createRange(); r.selectNodeContents(dk);
        const rects = [...r.getClientRects()].filter(x => x.width > 0);
        const tops = [...new Set(rects.map(x => Math.round(x.top)))].sort((a,b) => a - b);
        out.deckLines = tops.length || (dk.textContent.trim() ? 1 : 0);
        out.deckWidth = Math.round(dk.clientWidth);
        if(tops.length){
          const lastTop = tops[tops.length - 1];
          const last = rects.filter(x => Math.round(x.top) === lastTop);
          const w = Math.max(...last.map(x => x.right)) - Math.min(...last.map(x => x.left));
          out.deckFill = out.deckWidth > 0 ? Math.round((w / out.deckWidth) * 100) : 0;
        }
      }
      if(hl && strayWordLines(hl) > 0) out.stray.push('headline');
      if(dk && strayWordLines(dk) > 0) out.stray.push('deck');
      return out;
    };
    range.addEventListener('input', function(){ if(!autoCheck.checked) fitHeadline(); });
    document.getElementById('banner').addEventListener('input', function(e){
      const id = e.target.id;
      if(id === 'headline' || id === 'deck'){ if(!autoCheck.checked) range.value = HEADLINE_CAP; fitHeadline(); }
      if(id === 'catLabel'){ applyCatAccent(e.target.textContent); }
    });
    document.fonts.ready.then(fitHeadline);

    /* ── hint ── */
    function showHint(msg){
      const el = document.getElementById('actionHint');
      el.textContent = msg; el.style.opacity = '1';
      clearTimeout(window._hintT);
      window._hintT = setTimeout(function(){ el.style.opacity = '0'; }, 2000);
    }

    /* ── background image ── */
    const bannerBg = document.getElementById('bannerBg');
    function setBackground(src){
      bannerBg.style.backgroundImage =
        "linear-gradient(90deg, rgba(6,10,18,.20) 0%, rgba(6,10,18,0) 40%), url('"+src+"')";
    }
    const bgFileInput = document.getElementById('bgFileInput');
    document.getElementById('bgBtn').addEventListener('click', function(){ bgFileInput.click(); });
    bgFileInput.addEventListener('change', function(e){
      const f = e.target.files[0]; if(!f) return;
      setBackground(URL.createObjectURL(f)); bgFileInput.value=''; showHint('background set ✓');
    });

    /* drag-drop anywhere on the banner */
    const card = document.getElementById('banner');
    ['dragenter','dragover'].forEach(function(ev){
      card.addEventListener(ev, function(e){ e.preventDefault(); card.classList.add('drag'); });
    });
    ['dragleave','drop'].forEach(function(ev){
      card.addEventListener(ev, function(e){
        e.preventDefault();
        if(ev==='dragleave' && e.relatedTarget && card.contains(e.relatedTarget)) return;
        card.classList.remove('drag');
      });
    });
    card.addEventListener('drop', function(e){
      const f = e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0];
      if(f && f.type.indexOf('image')===0){ setBackground(URL.createObjectURL(f)); showHint('background set ✓'); }
    });

    /* ── reset ── */
    document.getElementById('resetBtn').addEventListener('click', function(){
      bannerBg.style.backgroundImage = '';
      render(currentIdx); showHint('reset ✓');
    });

    /* ── download button (HTTP only) ── */
    (function waitHTI(){
      if(typeof htmlToImage !== 'undefined'){
        const isFile = location.protocol === 'file:';
        const btn = document.getElementById('dlBtn');
        if(isFile){
          btn.style.display=''; btn.textContent='⬇ Download PNG';
          btn.title='Serve via HTTP to enable'; btn.style.opacity='0.4'; btn.style.cursor='not-allowed';
          btn.addEventListener('click',function(e){ e.preventDefault(); showHint('needs HTTP · use fullscreen'); });
        } else { btn.style.display=''; }
      } else { setTimeout(waitHTI, 200); }
    })();

    /* ── unsharp mask (same as news.html) ── */
    function gaussBlur(src,w,h,r){
      const sig=r/2||.6,rad=Math.max(1,Math.ceil(r*2));
      const k=new Float32Array(rad*2+1); let s=0;
      for(let i=-rad;i<=rad;i++){const v=Math.exp(-(i*i)/(2*sig*sig));k[i+rad]=v;s+=v;}
      for(let i=0;i<k.length;i++)k[i]/=s;
      const t=new Float32Array(w*h*3),o=new Float32Array(w*h*3);
      for(let y=0;y<h;y++)for(let x=0;x<w;x++){
        let cr=0,cg=0,cb=0;
        for(let j=-rad;j<=rad;j++){let sx=Math.max(0,Math.min(w-1,x+j));
          const wt=k[j+rad],si=(y*w+sx)*4;cr+=src[si]*wt;cg+=src[si+1]*wt;cb+=src[si+2]*wt;}
        const ti=(y*w+x)*3;t[ti]=cr;t[ti+1]=cg;t[ti+2]=cb;
      }
      for(let y=0;y<h;y++)for(let x=0;x<w;x++){
        let cr=0,cg=0,cb=0;
        for(let j=-rad;j<=rad;j++){let sy=Math.max(0,Math.min(h-1,y+j));
          const wt=k[j+rad],si=(sy*w+x)*3;cr+=t[si]*wt;cg+=t[si+1]*wt;cb+=t[si+2]*wt;}
        const oi=(y*w+x)*3;o[oi]=cr;o[oi+1]=cg;o[oi+2]=cb;
      }
      return o;
    }
    function unsharp(ctx,w,h,r,amt){
      const img=ctx.getImageData(0,0,w,h),d=img.data,bl=gaussBlur(d,w,h,r);
      for(let p=0,q=0;p<d.length;p+=4,q+=3){
        d[p]=Math.max(0,Math.min(255,d[p]+amt*(d[p]-bl[q])));
        d[p+1]=Math.max(0,Math.min(255,d[p+1]+amt*(d[p+1]-bl[q+1])));
        d[p+2]=Math.max(0,Math.min(255,d[p+2]+amt*(d[p+2]-bl[q+2])));
      }
      ctx.putImageData(img,0,0);
    }

    /* ── export pipeline: 1920x1080, pixelRatio 1 (delivery size) ── */
    document.getElementById('dlBtn').addEventListener('click', async function(){
      if(location.protocol==='file:') return;
      const btn=this, node=document.getElementById('banner'), stage=document.getElementById('stage');
      btn.textContent='… rendering'; btn.disabled=true;
      const prevT=stage.style.transform, prevH=stage.style.height;
      stage.style.transform='none'; stage.style.height=H+'px';
      await document.fonts.ready; fitHeadline();
      await new Promise(function(r){ requestAnimationFrame(function(){ requestAnimationFrame(r); }); });
      try{
        const canvas=await htmlToImage.toCanvas(node,{ width:W, height:H, pixelRatio:1, cacheBust:false, style:{transform:'none'} });
        stage.style.transform=prevT; stage.style.height=prevH;
        unsharp(canvas.getContext('2d'),canvas.width,canvas.height,1.0,0.4);
        const num=String(currentIdx+1).padStart(3,'0');
        canvas.toBlob(function(blob){
          const url=URL.createObjectURL(blob);
          const a=document.createElement('a'); a.href=url; a.download='pietro-article-'+num+'.png';
          document.body.appendChild(a); a.click(); a.remove();
          setTimeout(function(){ URL.revokeObjectURL(url); },4000);
          btn.textContent='✓ downloaded';
          setTimeout(function(){ btn.textContent='⬇ Download PNG'; btn.disabled=false; },2400);
        },'image/png');
      }catch(e){
        console.error(e); stage.style.transform=prevT; stage.style.height=prevH;
        btn.textContent='⬇ Download PNG'; btn.disabled=false;
        showHint(String(e).replace('Error:','').trim().slice(0,48));
      }
    });

    /* ── accent selection ── */
    function applyAccent(){
      const sel=window.getSelection();
      if(!sel||sel.rangeCount===0||sel.isCollapsed){ showHint('select text first'); return; }
      const r=sel.getRangeAt(0);
      const hl=document.getElementById('headline');
      if(!hl.contains(r.commonAncestorContainer)){ showHint('select text in the headline'); return; }
      let anc=r.commonAncestorContainer; if(anc.nodeType===3) anc=anc.parentElement;
      const existing=anc.closest&&anc.closest('.hl');
      if(existing&&hl.contains(existing)){
        existing.replaceWith(document.createTextNode(existing.textContent));
        hl.normalize(); sel.removeAllRanges(); showHint('accent removed'); fitHeadline(); return;
      }
      try{
        const span=document.createElement('span'); span.className='hl';
        r.surroundContents(span); sel.removeAllRanges(); showHint('accent applied ✓');
      }catch(e){
        const safe=r.toString().replace(/</g,'&lt;').replace(/>/g,'&gt;');
        document.execCommand('insertHTML',false,'<span class="hl">'+safe+'</span>');
        showHint('accent applied ✓');
      }
      fitHeadline();
    }
    document.getElementById('accentBtn').addEventListener('click', applyAccent);
    document.getElementById('clearHlBtn').addEventListener('click', function(){
      const hl=document.getElementById('headline');
      hl.querySelectorAll('.hl').forEach(function(s){ s.replaceWith(document.createTextNode(s.textContent)); });
      hl.normalize(); showHint('accents cleared'); fitHeadline();
    });

    /* ── glassmorphic dock ── */
    const dock = document.getElementById('dock');
    let _dockTimer;
    document.addEventListener('mousemove', function(e){
      const near = e.clientY > window.innerHeight - 80;
      if(near){ clearTimeout(_dockTimer); dock.classList.add('open'); }
      else if(!dock.matches(':hover')){ clearTimeout(_dockTimer); _dockTimer=setTimeout(function(){ dock.classList.remove('open'); },500); }
    });
    dock.addEventListener('mouseenter', function(){ clearTimeout(_dockTimer); dock.classList.add('open'); });
    dock.addEventListener('mouseleave', function(){ clearTimeout(_dockTimer); _dockTimer=setTimeout(function(){ dock.classList.remove('open'); },480); });

    /* ── init ── */
    document.getElementById('src').textContent = currentMonthLabel();
    document.getElementById('date').textContent = currentYearLabel();
    loadTSV();
  </script>
<script>
// floating back-to-Studio arrow — preview chrome only, never on the render path

  if(new URLSearchParams(location.search).has('headless')||navigator.webdriver===true||/\bHeadless/.test(navigator.userAgent||''))return;
  if(location.protocol!=='http:'&&location.protocol!=='https:')return;

  a.onmouseenter=function(){a.style.color='#04121a';a.style.background='#39e8ff';a.style.borderColor='#39e8ff';};

})();
</script>
