<!DOCTYPE html><!-- Pietro.works fluxogram template. Reusable 6-card flow diagram for README and LinkedIn.
     Data-driven: renderFluxo(spec) builds the cards from a spec; the default spec is the content pipeline.
     Render with: node renderer/fluxogram.mjs [--data spec.json] [--out out.png] [--format png|webp].
     Opened standalone in a browser it is ALSO an interactive editor (all editor chrome lives OUTSIDE
     #diagram; the headless render path — window.__FLUXO set, ?headless, or automation — never builds it). -->
<html lang="en"><head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Pietro.works — Fluxogram</title>
<style>
@font-face{font-family:'Clash Display';src:url('fonts/clash-600.woff2') format('woff2');font-weight:600;font-display:block;}
@font-face{font-family:'Clash Display';src:url('fonts/clash-700.woff2') format('woff2');font-weight:700;font-display:block;}
</style>
<link rel="stylesheet" href="fonts/dm.local.css"/>
<style id="fx-style">
  :root{--ink:#eef4ff;--muted:#9fb0d0;--dim:#6b7da0;--cyan:#39e8ff;--green:#00ff99;--purple:#a855f7;}
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{background:#04070d;}
  #diagram{position:relative;width:1600px;height:548px;overflow:hidden;background:#05080f;
    font-family:'DM Sans',sans-serif;color:var(--ink);isolation:isolate;}
  .grad{position:absolute;inset:0;z-index:0;background:
    radial-gradient(ellipse 60% 80% at 12% 6%, rgba(57,232,255,.10), transparent 60%),
    linear-gradient(160deg,#0a1324 0%,#080f1d 55%,#05090f 100%);}
  .photo{position:absolute;inset:0;z-index:1;background:url('fluxogram-bg.jpg') 43% 30%/cover;
    opacity:.5;filter:saturate(.7) contrast(1.04) brightness(.92);}
  .scrim{position:absolute;inset:0;z-index:2;pointer-events:none;background:
    linear-gradient(180deg,rgba(5,8,15,.72) 0%,rgba(5,8,15,.28) 24%,rgba(5,8,15,.3) 66%,rgba(5,8,15,.82) 100%),
    radial-gradient(120% 130% at 74% 40%, transparent 44%, rgba(5,8,15,.5) 100%);}
  .dots{position:absolute;inset:0;z-index:3;opacity:.12;mix-blend-mode:screen;
    background-image:image-set("hero-dot-matrix-static.avif" 1x type("image/avif"),"hero-dot-matrix-static.webp" 1x type("image/webp"),"hero-dot-matrix-static.png" 1x type("image/png"));
    background-position:50% -30%;background-repeat:no-repeat;background-size:cover;
    -webkit-mask-image:radial-gradient(120% 130% at 82% -10%,#000 0%,#000 24%,transparent 56%);
    mask-image:radial-gradient(120% 130% at 82% -10%,#000 0%,#000 24%,transparent 56%);}
  .frame{position:absolute;z-index:4;inset:26px;border:1px solid rgba(180,205,255,.14);border-radius:8px;pointer-events:none;}
  .wrap{position:absolute;z-index:5;inset:56px 72px;display:flex;flex-direction:column;}
  header{display:flex;justify-content:space-between;align-items:center;font-family:'DM Mono',monospace;font-size:17px;letter-spacing:.14em;}
  .kick{display:inline-flex;align-items:center;gap:11px;color:#eaf3ff;border:1px solid rgba(120,200,255,.3);border-radius:100px;padding:9px 18px;text-transform:uppercase;background:rgba(6,10,18,.34);backdrop-filter:blur(3px);}
  .kick .d{width:9px;height:9px;border-radius:50%;background:var(--green);box-shadow:0 0 12px var(--green);}
  .flow{text-transform:uppercase;color:#9db0cf;text-shadow:0 1px 10px rgba(0,0,0,.7);}
  .flow b{font-weight:500;background:linear-gradient(105deg,var(--cyan),var(--green) 52%,var(--purple));-webkit-background-clip:text;background-clip:text;color:transparent;}
  .row{flex:1;display:flex;align-items:center;justify-content:space-between;margin:4px 0;}
  .card{position:relative;width:216px;height:252px;border-radius:16px;padding:22px;
    background:rgba(10,17,32,.72);border:1px solid rgba(180,205,255,.14);backdrop-filter:blur(4px) saturate(1.05);
    box-shadow:0 24px 60px -30px rgba(0,0,0,.8);display:flex;flex-direction:column;}
  .card .num{font-family:'DM Mono',monospace;font-size:14px;color:var(--dim);letter-spacing:.06em;}
  .glyph{width:50px;height:50px;margin:4px 0 12px;color:var(--cyan);filter:drop-shadow(0 0 14px rgba(57,232,255,.4));}
  .glyph svg{width:100%;height:100%;fill:none;stroke:currentColor;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round;}
  .glyph.filled svg{fill:currentColor;stroke:currentColor;stroke-width:150;stroke-linejoin:round;stroke-linecap:round;}
  .name{font-family:'Clash Display',sans-serif;font-weight:600;font-size:29px;line-height:1;color:#fff;text-shadow:0 2px 14px rgba(0,0,0,.5);}
  .lines{margin-top:17px;font-family:'DM Mono',monospace;font-size:14px;line-height:1.5;color:#a9b8d4;white-space:nowrap;}
  .lines .hi{color:#bfefff;}
  .lines .hg{color:#8affc9;}
  .card.gate{width:250px;background:rgba(14,24,44,.86);border:1.5px solid transparent;backdrop-filter:blur(4px) saturate(1.05);
    background-image:linear-gradient(rgba(14,24,44,.9),rgba(14,24,44,.9)),linear-gradient(150deg,var(--cyan),var(--green) 50%,var(--purple));
    background-origin:border-box;background-clip:padding-box,border-box;
    box-shadow:0 0 0 1px rgba(0,255,153,.06),0 26px 70px -28px rgba(0,180,140,.45);}
  .card.gate .glyph{color:#fff;filter:drop-shadow(0 0 16px rgba(0,255,153,.55));}
  .card.gate .glyph svg{stroke:url(#gg);}
  .card.gate .glyph.filled svg{fill:url(#gg);stroke:url(#gg);}
  .tag{align-self:flex-start;margin-top:14px;font-family:'DM Mono',monospace;font-size:12px;letter-spacing:.1em;
    padding:5px 11px;border-radius:6px;color:#04140d;font-weight:500;
    background:linear-gradient(105deg,var(--cyan),var(--green) 55%,var(--purple));}
  .arr{font-family:'DM Mono',monospace;font-size:22px;color:var(--arr-color,#7f93b6);padding:0 4px;flex:0 0 auto;text-shadow:0 1px 8px rgba(0,0,0,.8);}
  footer{display:flex;justify-content:space-between;align-items:center;font-family:'DM Mono',monospace;font-size:16px;letter-spacing:.05em;color:#8194b5;text-shadow:0 1px 10px rgba(0,0,0,.7);}
  footer .value{color:#eaf3ff;}
  footer .value b{font-weight:500;background:linear-gradient(105deg,var(--cyan),var(--green) 52%,var(--purple));-webkit-background-clip:text;background-clip:text;color:transparent;}
</style>
<style id="ed-style">
  /* ---- interactive editor chrome (only built when NOT headless; entirely OUTSIDE #diagram) ---- */
  body.ed-on{display:flex;flex-direction:column;height:100vh;overflow:hidden;
    background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(20,30,60,.5),transparent 60%),linear-gradient(160deg,#05080f,#070b16 60%,#060a12);
    font-family:'DM Sans',system-ui,sans-serif;color:var(--ink);}
  #ed-preview{flex:0 0 auto;display:flex;align-items:center;justify-content:center;overflow:hidden;
    padding:22px;background:rgba(3,5,10,.5);border-bottom:1px solid rgba(120,160,230,.16);}
  #ed-stagebox{position:relative;}
  #ed-stage{position:absolute;top:0;left:0;transform-origin:top left;}
  #ed-panel{flex:1 1 auto;overflow-y:auto;padding:18px 22px 90px;}
  .ed-wrap{max-width:1180px;margin:0 auto;}
  .ed-top{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:16px;}
  .ed-brand{font-family:'DM Mono',monospace;font-size:15px;letter-spacing:.12em;color:#fff;}
  .ed-brand sup{color:var(--cyan);font-size:.6em;top:-.55em;}
  .ed-brand b{color:var(--muted);font-weight:400;letter-spacing:.08em;}
  .ed-note{font-family:'DM Mono',monospace;font-size:11px;color:var(--dim);letter-spacing:.04em;}
  .ed-actions{margin-left:auto;display:flex;gap:9px;flex-wrap:wrap;}
  .ed-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:16px;align-items:start;}
  .ed-sec{border:1px solid rgba(120,160,230,.16);background:rgba(255,255,255,.028);border-radius:14px;padding:15px 16px;}
  .ed-sec h3{font-family:'DM Mono',monospace;font-size:11px;font-weight:500;letter-spacing:.18em;text-transform:uppercase;color:var(--cyan);margin-bottom:12px;}
  .ed-field{margin-bottom:11px;}
  .ed-field:last-child{margin-bottom:0;}
  .ed-field label{display:block;font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.06em;color:var(--dim);margin-bottom:5px;}
  .ed-in,.ed-sel{width:100%;font-family:'DM Mono',monospace;font-size:13px;color:var(--ink);
    background:rgba(6,10,18,.7);border:1px solid rgba(120,160,230,.22);border-radius:8px;padding:8px 10px;outline:none;}
  .ed-in:focus,.ed-sel:focus{border-color:var(--cyan);box-shadow:0 0 0 2px rgba(57,232,255,.14);}
  .ed-in.mini{padding:6px 8px;font-size:12px;}
  .ed-file{display:block;margin-top:8px;width:100%;font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);}
  .ed-file::file-selector-button{font-family:'DM Mono',monospace;font-size:11px;color:var(--ink);background:rgba(120,160,230,.12);border:1px solid rgba(120,160,230,.3);border-radius:7px;padding:5px 10px;margin-right:9px;cursor:pointer;}
  .ed-row{display:flex;gap:8px;align-items:center;}
  .ed-row.wrap{flex-wrap:wrap;}
  .ed-hint{font-family:'DM Mono',monospace;font-size:10px;color:var(--dim);margin-top:4px;line-height:1.5;}
  .ed-btn{display:inline-flex;align-items:center;gap:7px;font-family:'DM Mono',monospace;font-size:12px;letter-spacing:.02em;
    border:1px solid rgba(120,160,230,.3);background:rgba(120,160,230,.08);color:var(--ink);border-radius:8px;
    padding:8px 13px;cursor:pointer;transition:background .18s,border-color .18s,opacity .18s;white-space:nowrap;}
  .ed-btn:hover{background:rgba(120,160,230,.18);}
  .ed-btn:disabled{opacity:.32;cursor:not-allowed;}
  .ed-btn.primary{background:var(--cyan);color:#04121a;border-color:var(--cyan);font-weight:600;}
  .ed-btn.primary:hover{background:#5fefff;}
  .ed-btn.g{border-color:rgba(57,232,255,.36);background:rgba(57,232,255,.09);}
  .ed-btn.g .grad{background:linear-gradient(105deg,#39e8ff,#00ff99 52%,#a855f7);-webkit-background-clip:text;background-clip:text;color:transparent;font-weight:600;}
  .ed-btn.tiny{padding:5px 9px;font-size:12px;line-height:1;}
  input[type=range]{accent-color:var(--cyan);}
  .ed-slider{display:flex;align-items:center;gap:10px;}
  .ed-slider input[type=range]{flex:1;}
  .ed-slider .val{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);min-width:52px;text-align:right;}
  /* cards */
  #ed-cards{display:flex;flex-direction:column;gap:12px;}
  .ed-card{border:1px solid rgba(120,160,230,.18);background:rgba(6,10,18,.5);border-radius:12px;padding:12px;}
  .ed-card.hero{border-color:rgba(0,255,153,.4);box-shadow:inset 0 0 0 1px rgba(0,255,153,.08);}
  .ed-card-head{display:flex;align-items:center;gap:9px;margin-bottom:10px;}
  .ed-card-head .idx{font-family:'DM Mono',monospace;font-size:11px;color:var(--dim);letter-spacing:.08em;}
  .ed-card-head .sp{flex:1;}
  .ed-glyph-btn{width:46px;height:46px;flex:0 0 auto;border:1px solid rgba(120,160,230,.3);border-radius:10px;
    background:rgba(6,10,18,.7);cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;}
  .ed-glyph-btn:hover{border-color:var(--cyan);}
  .ed-glyph-btn .glyph{width:26px;height:26px;margin:0;filter:none;}
  .ed-card-body{display:grid;grid-template-columns:1fr;gap:8px;}
  .ed-two{display:grid;grid-template-columns:56px 1fr;gap:8px;align-items:center;}
  .ed-linerow{display:flex;gap:6px;align-items:center;}
  .ed-linerow .ed-in{flex:1;}
  .ed-swatch{display:inline-flex;align-items:center;gap:8px;}
  .ed-chip{width:22px;height:22px;border-radius:6px;border:1px solid rgba(180,205,255,.3);cursor:pointer;padding:0;}
  .ed-chip.sel{outline:2px solid var(--cyan);outline-offset:1px;}
  .ed-hero-row{display:flex;align-items:center;gap:10px;margin-top:9px;flex-wrap:wrap;}
  .ed-check{display:inline-flex;align-items:center;gap:7px;font-family:'DM Mono',monospace;font-size:12px;color:var(--muted);cursor:pointer;user-select:none;}
  .ed-check input{accent-color:var(--green);width:15px;height:15px;}
  /* glyph picker modal */
  #ed-picker{position:fixed;inset:0;z-index:400;display:none;align-items:center;justify-content:center;
    background:rgba(3,5,10,.72);-webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px);}
  #ed-picker.open{display:flex;}
  .ed-picker-box{width:min(760px,92vw);max-height:80vh;overflow:auto;background:#0a0f1e;border:1px solid rgba(120,160,230,.28);
    border-radius:16px;padding:18px;box-shadow:0 30px 80px -20px rgba(0,0,0,.8);}
  .ed-picker-box h3{font-family:'DM Mono',monospace;font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--cyan);margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;}
  .ed-glyph-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(88px,1fr));gap:10px;}
  .ed-glyph-cell{display:flex;flex-direction:column;align-items:center;gap:7px;padding:12px 6px;cursor:pointer;
    border:1px solid rgba(120,160,230,.16);border-radius:10px;background:rgba(6,10,18,.5);transition:border-color .15s,background .15s;}
  .ed-glyph-cell:hover{border-color:var(--cyan);background:rgba(57,232,255,.08);}
  .ed-glyph-cell.sel{border-color:var(--green);background:rgba(0,255,153,.08);}
  .ed-glyph-cell .glyph{width:34px;height:34px;margin:0;filter:none;}
  .ed-glyph-cell span{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:.02em;}
  /* toast */
  #ed-toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%) translateY(20px);z-index:500;
    font-family:'DM Mono',monospace;font-size:12px;letter-spacing:.03em;color:#eaf3ff;
    background:rgba(10,17,32,.92);border:1px solid rgba(120,200,255,.3);border-radius:10px;padding:10px 16px;
    opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;box-shadow:0 12px 40px -12px rgba(0,0,0,.8);}
  #ed-toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>

function glyphHtml(name){
  const g = G[name] || G.frame;
  return '<div class="glyph'+(g.filled?' filled':'')+'"><svg viewBox="'+(g.vb||'0 0 24 24')+'">'+g.s+'</svg></div>';

        var cv = document.createElement('canvas'); cv.width=W*SC; cv.height=H*SC;
        var ctx = cv.getContext('2d');
        ctx.drawImage(img, 0, 0);
        try {
          cv.toBlob(function(blob){
            if(!blob){ toast('PNG failed — try Copy JSON'); return; }
            triggerDownload(URL.createObjectURL(blob), 'fluxogram.png'); toast('PNG downloaded');
          }, 'image/png');
        } catch(e){ toast('PNG blocked (serve over HTTP) — use Copy JSON'); }
      };
      img.onerror = function(){ toast('PNG failed to rasterize — use Copy JSON'); };
      img.src = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svg);
    }).catch(function(){ toast('PNG needs HTTP — use Copy JSON / fluxogram.mjs'); });
  }

  // ---- small DOM helpers ----------------------------------------------------
  function el(tag, opt){
    var e = document.createElement(tag); opt = opt||{};
    if(opt.id) e.id=opt.id; if(opt.class) e.className=opt.class;
    if(opt.style) e.setAttribute('style', opt.style); if(opt.text!=null) e.textContent=opt.text;
    return e;
  }
  function btn(label, fn, cls, icon, size){
    var b = document.createElement('button'); b.type='button';
    b.className = 'ed-btn' + (cls?(' '+cls):'') + (size?(' '+size):'');
    b.innerHTML = cls==='g' ? '<span class="grad">'+(icon?icon+' ':'')+label+'</span>' : (icon?icon+' ':'')+label;
    b.addEventListener('click', fn); return b;
  }
  function section(title){ var s=el('div',{class:'ed-sec'}); s.appendChild(el('h3',{text:title})); return s; }
  function field(label){ var f=el('div',{class:'ed-field'}); f.appendChild(el('label',{text:label})); return f; }
  function hint(html){ var h=el('div',{class:'ed-hint'}); h.innerHTML=html; return h; }
  function textField(label, val, onInput, hintHtml){
    var f = field(label);
    var inp = document.createElement('input'); inp.type='text'; inp.className='ed-in'; inp.value=val; inp.spellcheck=false;
    inp.addEventListener('input', function(){ onInput(inp.value); });
    f.appendChild(inp); if(hintHtml) f.appendChild(hint(hintHtml)); return f;
  }
  function inlineInput(val, ph, onInput){
    var inp = document.createElement('input'); inp.type='text'; inp.className='ed-in mini'; inp.value=val; inp.placeholder=ph; inp.spellcheck=false;
    inp.addEventListener('input', function(){ onInput(inp.value); }); return inp;
  }
  function lineInput(val, ph, onInput, onWrap){
    var row = el('div', {class:'ed-linerow'});
    var inp = document.createElement('input'); inp.type='text'; inp.className='ed-in mini'; inp.value=val; inp.placeholder=ph; inp.spellcheck=false;
    inp.addEventListener('input', function(){ onInput(inp.value); });
    var cy = btn('cyan', function(){ onWrap('hi'); }, '', '', 'tiny'); cy.title='wrap line in cyan highlight';
    var gr = btn('green', function(){ onWrap('hg'); }, '', '', 'tiny'); gr.title='wrap line in green highlight';
    row.appendChild(inp); row.appendChild(cy); row.appendChild(gr); return row;
  }
  function sliderField(label, min, max, step, val, unit, onInput, digits){
    var f = field(label);
    var box = el('div', {class:'ed-slider'});
    var r = document.createElement('input'); r.type='range'; r.min=min; r.max=max; r.step=step; r.value=val;
    var out = el('span', {class:'val', text: fmt(val)});
    function fmt(v){ return (digits!=null ? Number(v).toFixed(digits) : v) + unit; }
    r.addEventListener('input', function(){ var v=Number(r.value); out.textContent=fmt(v); onInput(v); });
    box.appendChild(r); box.appendChild(out); f.appendChild(box); f._range=r; f._out=out;
    return f;
  }
  function kindToSel(){ return S.bgKind==='db' ? ('db:'+S.bgName) : (S.bgKind==='custom' ? 'custom' : 'default'); }

  // rebuild static control values after a reset (sliders/inputs live outside the cards)
  function rebuildControls(){
    var inputs = secText.querySelectorAll('input.ed-in');
    inputs[0].value=S.kick; inputs[1].value=S.flow; inputs[2].value=S.footL; inputs[3].value=S.footR;
    var sliders = secBg.querySelectorAll('.ed-slider');
    setSlider(sliders[0], S.bgX); setSlider(sliders[1], S.bgY); setSlider(sliders[2], S.bgOpacity, 2);
    swat.querySelectorAll('.ed-chip').forEach(function(x,ix){ x.classList.toggle('sel', ARR_SWATCH[ix]===S.arrColor); });
  }
  function setSlider(box, v, digits){
    var r=box.querySelector('input[type=range]'), o=box.querySelector('.val');
    if(r) r.value=v; if(o){ var unit=o.textContent.replace(/[-0-9.]/g,''); o.textContent=(digits!=null?Number(v).toFixed(digits):v)+unit; }
  }

  function toast(msg){
    toastEl.textContent = msg; toastEl.classList.add('show');
    clearTimeout(toastEl._t); toastEl._t = setTimeout(function(){ toastEl.classList.remove('show'); }, 1800);
  }

  // ---- preview scaling ------------------------------------------------------
  function fitStage(){
    var availW = preview.clientWidth - 4;
    var availH = Math.min(preview.clientHeight, Math.round(window.innerHeight*0.5)) - 4;
    var k = Math.min(availW/1600, availH/548, 1); if(!(k>0)) k = availW/1600;
    stagebox.style.width = (1600*k)+'px';
    stagebox.style.height = (548*k)+'px';
    stage.style.transform = 'scale('+k+')';
  }

  // ---- boot -----------------------------------------------------------------
  rebuildCards();
  applyPreview();
  fitStage();
  window.addEventListener('resize', fitStage);
  if(document.fonts && document.fonts.ready) document.fonts.ready.then(fitStage);

  // exposed for headless self-tests / tooling; harmless in the browser
  window.__fluxoEditor = { state:S, exportSpec:exportSpec, specForRender:specForRender, applyPreview:applyPreview, G:G };
})();
</script>
