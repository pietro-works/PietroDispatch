<!DOCTYPE html><!-- Pietro.works fluxogram template. Reusable 6-card flow diagram for README and LinkedIn.
     Data-driven: renderFluxo(spec) builds the cards from a spec; the default spec is the content pipeline.
     Render with: node renderer/fluxogram.mjs [--data spec.json] [--out out.png] [--format png|webp].
     Opened standalone in a browser it is ALSO an interactive editor (all editor chrome lives OUTSIDE
     #diagram; the headless render path — window.__FLUXO set, ?headless, or automation — never builds it). -->
<html lang="en"><head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Pietro.works — Fluxogram</title>
<style>
@font-face{font-family:'Clash Display';src:url('fonts/clash-600.woff2') format('woff2');font-weight:600;font-display:block;}
@font-face{font-family:'Clash Display';src:url('fonts/clash-700.woff2') format('woff2');font-weight:700;font-display:block;}
</style>
<link rel="stylesheet" href="fonts/dm.local.css"/>
<style id="fx-style">
  :root{--ink:#eef4ff;--muted:#9fb0d0;--dim:#6b7da0;--cyan:#39e8ff;--green:#00ff99;--purple:#a855f7;}
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{background:#04070d;}
  #diagram{position:relative;width:1600px;height:548px;overflow:hidden;background:#05080f;
    font-family:'DM Sans',sans-serif;color:var(--ink);isolation:isolate;}
  #diagram .grad{position:absolute;inset:0;z-index:0;background:
    radial-gradient(ellipse 60% 80% at 12% 6%, rgba(57,232,255,.10), transparent 60%),
    linear-gradient(160deg,#0a1324 0%,#080f1d 55%,#05090f 100%);}
  #diagram .photo{position:absolute;inset:0;z-index:1;background:url('fluxogram-bg.jpg') 43% 30%/cover;
    opacity:.5;filter:saturate(.7) contrast(1.04) brightness(.92);}
  #diagram .scrim{position:absolute;inset:0;z-index:2;pointer-events:none;background:
    linear-gradient(180deg,rgba(5,8,15,.72) 0%,rgba(5,8,15,.28) 24%,rgba(5,8,15,.3) 66%,rgba(5,8,15,.82) 100%),
    radial-gradient(120% 130% at 74% 40%, transparent 44%, rgba(5,8,15,.5) 100%);}
  #diagram .dots{position:absolute;inset:0;z-index:3;opacity:.12;mix-blend-mode:screen;
    background-image:image-set("hero-dot-matrix-static.avif" 1x type("image/avif"),"hero-dot-matrix-static.webp" 1x type("image/webp"),"hero-dot-matrix-static.png" 1x type("image/png"));
    background-position:50% -30%;background-repeat:no-repeat;background-size:cover;
    -webkit-mask-image:radial-gradient(120% 130% at 82% -10%,#000 0%,#000 24%,transparent 56%);
    mask-image:radial-gradient(120% 130% at 82% -10%,#000 0%,#000 24%,transparent 56%);}
  #diagram .frame{position:absolute;z-index:4;inset:26px;border:1px solid rgba(180,205,255,.14);border-radius:8px;pointer-events:none;}
  #diagram .wrap{position:absolute;z-index:5;inset:56px 72px;display:flex;flex-direction:column;}
  #diagram header{display:flex;justify-content:space-between;align-items:center;font-family:'DM Mono',monospace;font-size:17px;letter-spacing:.14em;}
  #diagram .kick{display:inline-flex;align-items:center;gap:11px;color:#eaf3ff;border:1px solid rgba(120,200,255,.3);border-radius:100px;padding:9px 18px;text-transform:uppercase;background:rgba(6,10,18,.34);backdrop-filter:blur(3px);}
  #diagram .kick .d{width:9px;height:9px;border-radius:50%;background:var(--green);box-shadow:0 0 12px var(--green);}
  #diagram .flow{text-transform:uppercase;color:#9db0cf;text-shadow:0 1px 10px rgba(0,0,0,.7);}
  #diagram .flow b{font-weight:500;background:linear-gradient(105deg,var(--cyan),var(--green) 52%,var(--purple));-webkit-background-clip:text;background-clip:text;color:transparent;}
  #diagram .row{flex:1;display:flex;align-items:center;justify-content:space-between;margin:4px 0;}
  #diagram .card{position:relative;width:216px;height:252px;border-radius:16px;padding:22px;
    background:rgba(10,17,32,.72);border:1px solid rgba(180,205,255,.14);backdrop-filter:blur(4px) saturate(1.05);
    box-shadow:0 24px 60px -30px rgba(0,0,0,.8);display:flex;flex-direction:column;}
  #diagram .card .num{font-family:'DM Mono',monospace;font-size:14px;color:var(--dim);letter-spacing:.06em;}
  #diagram .glyph{width:50px;height:50px;margin:4px 0 12px;color:var(--cyan);filter:drop-shadow(0 0 14px rgba(57,232,255,.4));}
  #diagram .glyph svg{width:100%;height:100%;fill:none;stroke:currentColor;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round;}
  #diagram .glyph.filled svg{fill:currentColor;stroke:currentColor;stroke-width:150;stroke-linejoin:round;stroke-linecap:round;}
  #diagram .name{font-family:'Clash Display',sans-serif;font-weight:600;font-size:29px;line-height:1;color:#fff;text-shadow:0 2px 14px rgba(0,0,0,.5);}
  #diagram .lines{margin-top:17px;font-family:'DM Mono',monospace;font-size:14px;line-height:1.5;color:#a9b8d4;white-space:nowrap;}
  #diagram .lines .hi{color:#bfefff;}
  #diagram .lines .hg{color:#8affc9;}
  #diagram .card.gate{width:250px;background:rgba(14,24,44,.86);border:1.5px solid transparent;backdrop-filter:blur(4px) saturate(1.05);
    background-image:linear-gradient(rgba(14,24,44,.9),rgba(14,24,44,.9)),linear-gradient(150deg,var(--cyan),var(--green) 50%,var(--purple));
    background-origin:border-box;background-clip:padding-box,border-box;
    box-shadow:0 0 0 1px rgba(0,255,153,.06),0 26px 70px -28px rgba(0,180,140,.45);}
  #diagram .card.gate .glyph{color:#fff;filter:drop-shadow(0 0 16px rgba(0,255,153,.55));}
  #diagram .card.gate .glyph svg{stroke:url(#gg);}
  #diagram .card.gate .glyph.filled svg{fill:url(#gg);stroke:url(#gg);}
  #diagram .tag{align-self:flex-start;margin-top:14px;font-family:'DM Mono',monospace;font-size:12px;letter-spacing:.1em;
    padding:5px 11px;border-radius:6px;color:#04140d;font-weight:500;
    background:linear-gradient(105deg,var(--cyan),var(--green) 55%,var(--purple));}
  #diagram .arr{font-family:'DM Mono',monospace;font-size:22px;color:var(--arr-color,#7f93b6);padding:0 4px;flex:0 0 auto;text-shadow:0 1px 8px rgba(0,0,0,.8);}
  #diagram footer{display:flex;justify-content:space-between;align-items:center;font-family:'DM Mono',monospace;font-size:16px;letter-spacing:.05em;color:#8194b5;text-shadow:0 1px 10px rgba(0,0,0,.7);}
  #diagram footer .value{color:#eaf3ff;}
  #diagram footer .value b{font-weight:500;background:linear-gradient(105deg,var(--cyan),var(--green) 52%,var(--purple));-webkit-background-clip:text;background-clip:text;color:transparent;}
</style>
<style id="ed-style">
  /* ---- on-canvas editor chrome (never built on the headless render path) ---- */
  body.ed2{height:100vh;margin:0;overflow:hidden;display:flex;align-items:center;justify-content:center;
    background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(20,30,60,.5),transparent 60%),linear-gradient(160deg,#05080f,#070b16 60%,#060a12);}
  #ed-stage{position:relative;flex:0 0 auto;}
  #ed-stage #diagram{transform-origin:top left;box-shadow:0 40px 120px -40px rgba(0,0,0,.9);}
  #diagram .ed-editing{outline:1.5px dashed rgba(57,232,255,.85);outline-offset:3px;cursor:text;min-width:12px;}
  #diagram .ed-over{outline:1.5px dashed rgba(248,113,113,.9);outline-offset:2px;}
  body.ed2 #diagram .kick,body.ed2 #diagram .flow,body.ed2 #diagram .name,body.ed2 #diagram .num,
  body.ed2 #diagram .lines,body.ed2 #diagram .tag,body.ed2 #diagram footer span,body.ed2 #diagram .glyph,
  body.ed2 #diagram .arr,body.ed2 #diagram .card{cursor:pointer;}
  /* popup */
  #ed-pop{position:fixed;z-index:300;left:20px;bottom:34px;min-width:210px;max-width:330px;background:rgba(8,13,26,.96);border:1px solid rgba(120,200,255,.3);
    border-radius:12px;padding:12px 13px;box-shadow:0 20px 60px -18px rgba(0,0,0,.85);-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);
    font-family:'DM Mono',monospace;font-size:11px;color:#9fb0d0;display:none;}
  #ed-pop.open{display:block;}
  #ed-pop h4{font-size:10px;font-weight:500;letter-spacing:.16em;text-transform:uppercase;color:var(--cyan);margin:0 0 4px;display:flex;justify-content:space-between;align-items:center;gap:14px;}
  #ed-pop h4 .x{cursor:pointer;color:#6b7da0;font-size:12px;}
  #ed-pop h4 .x:hover{color:#fff;}
  .edp-row{display:flex;align-items:center;gap:7px;margin-top:8px;flex-wrap:wrap;}
  .edp-lab{min-width:46px;color:#6b7da0;letter-spacing:.04em;}
  .edp-chip{width:20px;height:20px;border-radius:6px;border:1px solid rgba(180,205,255,.3);cursor:pointer;padding:0;}
  .edp-chip.sel{outline:2px solid var(--cyan);outline-offset:1px;}
  .edp-chip.none{background:linear-gradient(135deg,#26344e 44%,#f87171 50%,#26344e 56%);}
  #ed-pop input[type=range]{flex:1;accent-color:var(--cyan);min-width:70px;}
  .edp-val{min-width:36px;text-align:right;color:#9fb0d0;}
  .edp-btn{font-family:'DM Mono',monospace;font-size:11px;color:#eef4ff;background:rgba(120,160,230,.1);
    border:1px solid rgba(120,160,230,.3);border-radius:7px;padding:5px 9px;cursor:pointer;}
  .edp-btn:hover{border-color:var(--cyan);}
  .edp-btn:disabled{opacity:.3;cursor:default;}
  #ed-pop input[type=text]{flex:1;font-family:'DM Mono',monospace;font-size:11px;color:#eef4ff;background:rgba(6,10,18,.8);
    border:1px solid rgba(120,160,230,.25);border-radius:7px;padding:5px 8px;outline:none;min-width:110px;}
  #ed-pop input[type=text]:focus{border-color:var(--cyan);}
  .edp-check{display:inline-flex;align-items:center;gap:6px;cursor:pointer;color:#9fb0d0;}
  .edp-check input{accent-color:var(--green);}
  .edp-bgs{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-top:8px;max-height:132px;overflow:auto;}
  .edp-bg{height:26px;border-radius:5px;border:1px solid rgba(120,160,230,.25);cursor:pointer;background-size:cover;background-position:center;
    font-size:8px;color:#cfe0ff;display:flex;align-items:flex-end;justify-content:center;overflow:hidden;text-shadow:0 1px 3px #000;padding:0;}
  .edp-bg.sel{outline:2px solid var(--green);}
  /* glyph grid modal */
  #ed-picker{position:fixed;inset:0;z-index:400;display:none;align-items:center;justify-content:center;background:rgba(3,5,10,.72);-webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px);}
  #ed-picker.open{display:flex;}
  .ed-picker-box{width:min(700px,92vw);max-height:78vh;overflow:auto;background:#0a0f1e;border:1px solid rgba(120,160,230,.28);border-radius:16px;padding:18px;}
  .ed-picker-box h3{font-family:'DM Mono',monospace;font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--cyan);margin:0 0 14px;display:flex;justify-content:space-between;align-items:center;}
  .ed-glyph-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(84px,1fr));gap:10px;}
  .ed-glyph-cell{display:flex;flex-direction:column;align-items:center;gap:7px;padding:11px 6px;cursor:pointer;border:1px solid rgba(120,160,230,.16);border-radius:10px;background:rgba(6,10,18,.5);}
  .ed-glyph-cell:hover{border-color:var(--cyan);}
  .ed-glyph-cell.sel{border-color:var(--green);}
  .ed-glyph-cell .glyph{width:32px;height:32px;margin:0;filter:none;color:var(--cyan);}
  .ed-glyph-cell .glyph svg{width:100%;height:100%;fill:none;stroke:currentColor;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round;}
  .ed-glyph-cell .glyph.filled svg{fill:currentColor;stroke:currentColor;stroke-width:150;}
  .ed-glyph-cell span{font-family:'DM Mono',monospace;font-size:10px;color:#9fb0d0;}
  /* bottom slide-up bar — same system as the Studio schedule bar (full-width, blur, ghost + gradient primary) */
  #ed-bar{position:fixed;left:0;right:0;bottom:0;z-index:250;display:flex;align-items:center;gap:10px;
    padding:20px 26px 14px;background:rgba(6,10,19,.9);-webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);
    border-top:1px solid rgba(180,205,255,.14);transform:translateY(calc(100% - 14px));transition:transform .25s ease;}
  #ed-bar:hover,#ed-bar:focus-within,#ed-bar.up{transform:translateY(0);}
  #ed-bar::before{content:'';position:absolute;top:5px;left:50%;transform:translateX(-50%);width:44px;height:3px;border-radius:2px;background:rgba(159,176,208,.4);}
  #ed-bar .brand{font-family:'DM Mono',monospace;font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:#fff;margin-right:auto;white-space:nowrap;}
  #ed-bar .brand sup{color:var(--cyan);font-size:.6em;text-transform:none;}
  .ed-btn{display:inline-flex;align-items:center;gap:6px;font-family:'DM Mono',monospace;font-size:12px;letter-spacing:.04em;font-weight:500;
    border:1px solid rgba(120,200,255,.3);background:transparent;color:#9fb0d0;border-radius:10px;
    padding:10px 16px;cursor:pointer;transition:.12s;white-space:nowrap;}
  .ed-btn:hover{color:#eef4ff;border-color:var(--cyan);}
  .ed-btn.primary{background:linear-gradient(105deg,var(--cyan),#5fefff);color:#04121a;border:none;font-weight:600;}
  .ed-btn.primary:hover{filter:brightness(1.1);color:#04121a;}
  .ed-btn.g{border-color:rgba(57,232,255,.36);}
  .ed-btn.g .grad2{background:linear-gradient(105deg,#39e8ff,#00ff99 52%,#a855f7);-webkit-background-clip:text;background-clip:text;color:transparent;font-weight:600;}
  /* toast */
  #ed-toast{position:fixed;left:50%;top:20px;transform:translateX(-50%) translateY(-8px);z-index:500;font-family:'DM Mono',monospace;font-size:12px;color:#eaf3ff;background:rgba(10,17,32,.94);border:1px solid rgba(120,200,255,.3);border-radius:10px;padding:9px 15px;opacity:0;pointer-events:none;transition:.25s;}
  #ed-toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>

const G = {

  refresh:{s:'<path d="M3 12a9 9 0 0 1 9-9 9.7 9.7 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.7 9.7 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/>'},

  database:{s:'<ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5V19A9 3 0 0 0 21 19V5"/><path d="M3 12A9 3 0 0 0 21 12"/>'},
  listchecks:{s:'<path d="m3 7 2 2 4-4"/><path d="m3 17 2 2 4-4"/><line x1="13" y1="6" x2="21" y2="6"/><line x1="13" y1="12" x2="21" y2="12"/><line x1="13" y1="18" x2="21" y2="18"/>'},
  activity:{s:'<path d="M22 12h-4l-3 9L9 3l-3 9H2"/>'},
  cpu:{s:'<rect x="4" y="4" width="16" height="16" rx="2"/><rect x="9" y="9" width="6" height="6"/><path d="M15 2v2M15 20v2M2 15h2M2 9h2M20 15h2M20 9h2M9 2v2M9 20v2"/>'},

function glyphHtml(name, tintColor){
  const g = G[name] || G.frame;
  return '<div class="glyph'+(g.filled?' filled':'')+'"'+(tintColor?' style="color:'+tintColor+'"':'')+'><svg viewBox="'+(g.vb||'0 0 24 24')+'">'+g.s+'</svg></div>';
}

// renderFluxo(spec): build the flow. spec = { kick, flow, cards:[{num,glyph,name,l1,l2,hero,tag}], footL, footR, bgUrl, bgPos, bgOpacity, arr, arrColor, arrs, tint }
// arr/arrColor are global connector overrides; arrs[i] overrides the i-th gap's character.
// tint carries optional per-element colours: {kick,flow,footL,footR,arrs:[],cards:[{num,glyph,name,lines,tag,bg}]}.
// Every extension is optional — a spec without them renders exactly like the original template.

function renderFluxo(spec){

  if(s.bgUrl) photo.style.backgroundImage = "url('"+s.bgUrl+"')";
  photo.style.backgroundPosition = s.bgPos || '43% 30%';
  if(s.bgOpacity!=null) photo.style.opacity = s.bgOpacity;
  document.getElementById('diagram').style.setProperty('--arr-color', s.arrColor || '');
  const arrChar = (s.arr!=null && s.arr!=='') ? s.arr : '→';
  const tint = s.tint || {};
  const tcards = tint.cards || [];
  const tarrs = tint.arrs || [];
  const st = function(css){ return css ? ' style="'+css+'"' : ''; };
  const col = function(c){ return c ? 'color:'+c : ''; };
  let row = '';
  s.cards.forEach(function(c, i){
    const t = tcards[i] || {};
    if(i){
      const ch = (s.arrs && s.arrs[i-1]!=null && s.arrs[i-1]!=='') ? s.arrs[i-1] : arrChar;
      row += '<span class="arr"'+st(col(tarrs[i-1]))+'>'+ch+'</span>';
    }
    row += '<div class="card'+(c.hero?' gate':'')+'"'+st(t.bg?'background-color:'+t.bg:'')+'>'
      + '<span class="num"'+st(col(t.num))+'>'+c.num+'</span>'
      + glyphHtml(c.glyph, t.glyph)
      + '<div class="name"'+st(col(t.name))+'>'+c.name+'</div>'
      + '<div class="lines"'+st(col(t.lines))+'>'+c.l1+'<br>'+c.l2+'</div>'
      + (c.hero && c.tag ? '<span class="tag"'+st(t.tag?'background:'+t.tag:'')+'>'+c.tag+'</span>' : '')
      + '</div>';
  });

      '<header><span class="kick"'+st(col(tint.kick))+'><span class="d"></span>'+s.kick+'</span><span class="flow"'+st(col(tint.flow))+'>'+s.flow+'</span></header>'
    + '<div class="row">'+row+'</div>'
    + '<footer><span'+st(col(tint.footL))+'>'+s.footL+'</span><span class="value"'+st(col(tint.footR))+'>'+s.footR+'</span></footer>';
}

    {num:'04',glyph:'frame',name:'Render',l1:'headless Chrome',l2:'2160, <span class="hi">fit-measured</span>'},
    {num:'05',glyph:'shield',name:'Gate',hero:true,l1:'<span class="hi">two adversarial passes</span>',l2:'voice, then contract',tag:'a fail is a rewrite'},
    {num:'06',glyph:'cloud',name:'Deliver',l1:'only what passed',l2:'into a dated folder'},
  ],

renderFluxo(window.__FLUXO || DEFAULT);

    }
    slider('pos x',0,100,1,S.bgX,function(v){S.bgX=v;},function(v){return v+'%';});
    slider('pos y',0,100,1,S.bgY,function(v){S.bgY=v;},function(v){return v+'%';});
    slider('opacity',0,1,.02,S.bgOpacity,function(v){S.bgOpacity=v;},function(v){return Number(v).toFixed(2);});
  }

  function moveCard(i,d){var j=i+d;if(j<0||j>=S.cards.length)return;
    sw(S.cards,i,j);sw(S.tint.cards,i,j);render();closePop();}
  function sw(a,i,j){var t=a[i];a[i]=a[j];a[j]=t;}
  function removeCard(i){ if(S.cards.length<=3)return;
    S.cards.splice(i,1);S.tint.cards.splice(i,1);syncLen();render();closePop();}
  function addCard(){ if(S.cards.length>=6)return;
    var mx=0;S.cards.forEach(function(c){var n=parseInt(c.num,10);if(!isNaN(n)&&n>mx)mx=n;});
    S.cards.push({num:String((mx>0?mx:S.cards.length)+1).padStart(2,'0'),glyph:'zap',name:'Step',l1:'first line',l2:'second line',hero:false,tag:''});
    syncLen();render();closePop();}

  // ---- glyph picker modal ----------------------------------------------------
  var picker=el('div',{id:'ed-picker'});
  var pickerBox=el('div',{class:'ed-picker-box'});
  var pickerHead=document.createElement('h3');
  pickerHead.innerHTML='<span>Pick a glyph</span>';
  var pcl=pbtn('close',closePicker); pickerHead.appendChild(pcl);
  var glyphGrid=el('div',{class:'ed-glyph-grid'});
  GLYPHS.forEach(function(name){
    var cell=document.createElement('button'); cell.type='button'; cell.className='ed-glyph-cell'; cell.dataset.g=name;
    cell.innerHTML=glyphHtml(name)+'<span>'+name+'</span>';
    cell.onclick=function(){pickGlyph(name);};
    glyphGrid.appendChild(cell);
  });
  pickerBox.appendChild(pickerHead); pickerBox.appendChild(glyphGrid); picker.appendChild(pickerBox);
  picker.addEventListener('click',function(e){if(e.target===picker)closePicker();});
  document.body.appendChild(picker);
  var pickerFor=-1;
  function openPicker(i){
    pickerFor=i;
    glyphGrid.querySelectorAll('.ed-glyph-cell').forEach(function(c){c.classList.toggle('sel',c.dataset.g===S.cards[i].glyph);});
    picker.classList.add('open');
  }
  function closePicker(){picker.classList.remove('open');pickerFor=-1;}
  function pickGlyph(name){if(pickerFor<0)return;S.cards[pickerFor].glyph=name;closePicker();render();}

  // ---- bottom slide-up bar ---------------------------------------------------
  var bar=el('div',{id:'ed-bar'});
  var brand=el('span',{class:'brand'}); brand.innerHTML='Pietro<sup>.works</sup> fluxogram'; bar.appendChild(brand);
  var loadInput=document.createElement('input'); loadInput.type='file'; loadInput.accept='application/json,.json'; loadInput.style.display='none';
  loadInput.addEventListener('change',function(e){
    var f=e.target.files&&e.target.files[0]; loadInput.value=''; if(!f)return;
    var r=new FileReader();
    r.onload=function(){ try{importSpec(JSON.parse(r.result));toast('loaded '+f.name);}catch(err){toast('could not read spec: '+err.message);} };
    r.readAsText(f);
  });
  bar.appendChild(loadInput);
  function bbtn(label,fn,cls){var b=document.createElement('button');b.type='button';b.className='ed-btn'+(cls?' '+cls:'');b.textContent=label;b.onclick=fn;return b;}
  bar.appendChild(bbtn('Load .json',function(){loadInput.click();}));
  bar.appendChild(bbtn('Copy JSON',copyJson,'primary'));
  bar.appendChild(bbtn('Download .json',downloadJson));
  var pngB=document.createElement('button'); pngB.type='button'; pngB.className='ed-btn g';
  pngB.innerHTML='<span class="grad2">⬇ Download PNG</span>'; pngB.onclick=downloadPng; bar.appendChild(pngB);
  bar.appendChild(bbtn('Render → posts',function(){
    toast('rendering to dispatch-posts…');
    fetch('/api/render',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({kind:'fluxogram',spec:exportSpec()})})
      .then(function(r){return r.json();}).then(function(d){toast(d.ok?('wrote '+d.files.join(' + ')):('render failed: '+(d.error||d.log||'').slice(-160)));})
      .catch(function(){toast('needs the Studio server — open via Studio.command');});
  }));
  bar.appendChild(bbtn('Reset',function(){freshState();render();closePop();toast('reset to the default pipeline');}));
  document.body.appendChild(bar);

  var toastEl=el('div',{id:'ed-toast'}); document.body.appendChild(toastEl);
  function toast(msg){
    toastEl.textContent=msg; toastEl.classList.add('show');
    clearTimeout(toastEl._t); toastEl._t=setTimeout(function(){toastEl.classList.remove('show');},2000);
  }

  document.addEventListener('mousedown',function(e){
    if(pop.contains(e.target)||diagram.contains(e.target)||bar.contains(e.target)||picker.contains(e.target))return;
    closePop();
  });
  document.addEventListener('keydown',function(e){ if(e.key==='Escape'){closePicker();closePop();} });

  // ---- export actions --------------------------------------------------------
  function specJson(){ return JSON.stringify(exportSpec(),null,2); }
  function copyJson(){
    var txt=specJson();
    if(navigator.clipboard&&navigator.clipboard.writeText){
      navigator.clipboard.writeText(txt).then(function(){toast('spec JSON copied');},function(){fallbackCopy(txt);});
    } else fallbackCopy(txt);
  }
  function fallbackCopy(txt){
    var ta=document.createElement('textarea'); ta.value=txt; ta.style.position='fixed'; ta.style.opacity='0';
    document.body.appendChild(ta); ta.select();
    try{document.execCommand('copy');toast('spec JSON copied');}catch(e){toast('copy failed — use Download .json');}
    ta.remove();
  }
  function downloadJson(){
    var blob=new Blob([specJson()],{type:'application/json'});
    triggerDownload(URL.createObjectURL(blob),'fluxogram-spec.json'); toast('spec.json downloaded');
  }
  function triggerDownload(url,name){
    var a=document.createElement('a'); a.href=url; a.download=name; document.body.appendChild(a); a.click(); a.remove();
    setTimeout(function(){URL.revokeObjectURL(url);},4000);
  }

  // ---- offline PNG export (SVG <foreignObject>, fonts + images embedded) -----
  var _fontCss=null,_fetchCache={};
  function fetchDataURL(url){
    if(_fetchCache[url])return _fetchCache[url];
    var p=fetch(url).then(function(r){if(!r.ok)throw new Error('fetch '+url);return r.blob();}).then(function(b){
      return new Promise(function(res,rej){var fr=new FileReader();fr.onload=function(){res(fr.result);};fr.onerror=rej;fr.readAsDataURL(b);});
    });
    _fetchCache[url]=p; return p;
  }
  function fontCss(){
    if(_fontCss)return _fontCss;
    var faces=[
      ['Clash Display',600,'fonts/clash-600.woff2'],
      ['Clash Display',700,'fonts/clash-700.woff2'],
      ['DM Sans',400,'fonts/rP2Yp2ywxg089UriI5-g4vlH9VoD8Cmcqbu0-K6z9mXg.woff2'],
      ['DM Sans',500,'fonts/rP2Yp2ywxg089UriI5-g4vlH9VoD8Cmcqbu0-K6z9mXg.woff2'],
      ['DM Sans',600,'fonts/rP2Yp2ywxg089UriI5-g4vlH9VoD8Cmcqbu0-K6z9mXg.woff2'],
      ['DM Sans',700,'fonts/rP2Yp2ywxg089UriI5-g4vlH9VoD8Cmcqbu0-K6z9mXg.woff2'],
      ['DM Mono',400,'fonts/aFTU7PB1QTsUX8KYthqQBK6PYK0.woff2'],
      ['DM Mono',500,'fonts/aFTR7PB1QTsUX8KYvumzEYOtbYf-Vlg.woff2']
    ];
    _fontCss=Promise.all(faces.map(function(f){
      return fetchDataURL(f[2]).then(function(d){
        return "@font-face{font-family:'"+f[0]+"';font-style:normal;font-weight:"+f[1]+";font-display:block;src:url("+d+") format('woff2');}";
      },function(){return '';});
    })).then(function(parts){return parts.join('');});
    return _fontCss;
  }
  function bgDataUrl(){
    if(S.bgKind==='custom')return Promise.resolve(/^data:/.test(S.bgUrl)?S.bgUrl:null);
    var url=S.bgKind==='db'?BG_DB_REL+S.bgName:'fluxogram-bg.jpg';
    return fetchDataURL(url).catch(function(){return null;});
  }
  function downloadPng(){
    if(editing)commitEdit();
    toast('rendering PNG…');
    Promise.all([
      fontCss(),
      bgDataUrl(),
      fetchDataURL('hero-dot-matrix-static.png').catch(function(){return null;})
    ]).then(function(res){
      var css=res[0],bgu=res[1],dotu=res[2];
      var node=diagram.cloneNode(true);
      node.style.transform='';
      node.querySelectorAll('[contenteditable]').forEach(function(n){n.removeAttribute('contenteditable');});
      node.querySelectorAll('.ed-over,.ed-editing').forEach(function(n){n.classList.remove('ed-over');n.classList.remove('ed-editing');});
      var ph=node.querySelector('.photo');
      if(ph){ if(bgu)ph.style.backgroundImage="url('"+bgu+"')"; ph.style.backgroundPosition=bgPosStr(); ph.style.opacity=S.bgOpacity; }
      var dt=node.querySelector('.dots'); if(dt&&dotu)dt.style.backgroundImage="url('"+dotu+"')";
      var baseCss=document.getElementById('fx-style').textContent;
      // foreignObject can't composite backdrop-filter (the card right-edge clips) and rasterizes
      // at the SVG's declared size — so we render NATIVE 2x (no upscale = no blur) and flatten the
      // glass to a solid fill. The pixel-perfect path is still Copy JSON -> fluxogram.mjs.
      var W=1600,H=548,SC=2;
      var flatCss=
        '.card,.kick{backdrop-filter:none!important;-webkit-backdrop-filter:none!important;}'
        + '.card:not(.gate){background:rgba(12,19,34,.93)!important;}'
        + '.kick{background:rgba(6,10,18,.62)!important;}';
      var inner=new XMLSerializer().serializeToString(node);
      var svg=
        '<svg xmlns="http://www.w3.org/2000/svg" width="'+(W*SC)+'" height="'+(H*SC)+'">'
        + '<foreignObject x="0" y="0" width="'+(W*SC)+'" height="'+(H*SC)+'">'
        + '<div xmlns="http://www.w3.org/1999/xhtml" style="width:'+W+'px;height:'+H+'px;transform:scale('+SC+');transform-origin:top left;">'
        + '<style>'+css+baseCss+flatCss+'</style>'
        + inner
        + '</div></foreignObject></svg>';
      var img=new Image();
      img.onload=function(){
        var cv=document.createElement('canvas'); cv.width=W*SC; cv.height=H*SC;
        var ctx=cv.getContext('2d');
        ctx.drawImage(img,0,0);
        try{
          cv.toBlob(function(blob){
            if(!blob){toast('PNG failed — try Copy JSON');return;}
            triggerDownload(URL.createObjectURL(blob),'fluxogram.png'); toast('PNG downloaded');
          },'image/png');
        }catch(e){toast('PNG blocked (serve over HTTP) — use Copy JSON');}
      };
      img.onerror=function(){toast('PNG failed to rasterize — use Copy JSON');};
      img.src='data:image/svg+xml;charset=utf-8,'+encodeURIComponent(svg);
    }).catch(function(){toast('PNG needs HTTP — use Copy JSON / fluxogram.mjs');});
  }

  // ---- small DOM helper ------------------------------------------------------
  function el(tag,opt){
    var e=document.createElement(tag); opt=opt||{};
    if(opt.id)e.id=opt.id; if(opt.class)e.className=opt.class;
    if(opt.style)e.setAttribute('style',opt.style); if(opt.text!=null)e.textContent=opt.text;
    return e;
  }

  // ---- boot ------------------------------------------------------------------
  freshState();
  render();
  fit();
  if(document.fonts&&document.fonts.ready)document.fonts.ready.then(function(){fit();render();});

  // exposed for headless self-tests / tooling; harmless in the browser
  window.__fluxoEditor={ get state(){return S;}, exportSpec:exportSpec, importSpec:importSpec, specForRender:specForRender, render:render, G:G };
})();
</script>
<script>
// floating back-to-Studio arrow — editor/preview chrome only, never on the render path
(function(){
  if(new URLSearchParams(location.search).has('headless')||navigator.webdriver===true||/\bHeadless/.test(navigator.userAgent||''))return;
  if(location.protocol!=='http:'&&location.protocol!=='https:')return;
  var a=document.createElement('a');a.id='pw-back';a.href='/';a.title='Back to Studio';a.textContent='\u2190';
  a.style.cssText="position:fixed;top:16px;left:16px;z-index:600;width:40px;height:40px;display:flex;align-items:center;justify-content:center;font:500 17px/1 'DM Mono',monospace;color:#9fb0d0;text-decoration:none;background:rgba(6,10,19,.72);border:1px solid rgba(120,200,255,.3);border-radius:50%;-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);transition:.15s;";
  a.onmouseenter=function(){a.style.color='#04121a';a.style.background='#39e8ff';a.style.borderColor='#39e8ff';};
  a.onmouseleave=function(){a.style.color='#9fb0d0';a.style.background='rgba(6,10,19,.72)';a.style.borderColor='rgba(120,200,255,.3)';};
  document.body.appendChild(a);
})();
</script>
