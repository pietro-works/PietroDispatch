<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Pietro.works — News Card Generator</title>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<style id="clash-display-faces">
@font-face {
  font-family: 'Clash Display';
  src: url('https://cdn.fontshare.com/wf/2GQIT54GKQY3JRFTSHS4ARTRNRQISSAA/3CIP5EBHRRHE5FVQU3VFROPUERNDSTDF/JTSL5QESUXATU47LCPUNHZQBDDIWDOSW.woff2') format('woff2');
  font-weight: 500; font-display: swap; font-style: normal;
}
@font-face {
  font-family: 'Clash Display';
  src: url('https://cdn.fontshare.com/wf/FPDAZ2S6SW4QMSRIIKNNGTPM6VIXYMKO/5HNPQ453FRLIQWV2FNOBUU3FKTDZQVSG/Z3MGHFHX6DCTLQ55LJYRJ5MDCZPMFZU6.woff2') format('woff2');
  font-weight: 600; font-display: swap; font-style: normal;
}
@font-face {
  font-family: 'Clash Display';
  src: url('https://cdn.fontshare.com/wf/BFBSY7LX5W2U2EROCLVVTQP4VS7S4PC3/IIUX4FGTMD2LK2VWD3RVTAS4SSMUN7B5/53RZKGODFYDW3QHTIL7IPOWTBCSUEZK7.woff2') format('woff2');
  font-weight: 700; font-display: swap; font-style: normal;
}

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,300;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  :root{
    /* dark spectrum — cinematic */
    --bg:#060a12; --bg2:#0a0f1e; --bg3:#0e1525;
    --ink:#eef4ff; --muted:#9fb0d0; --dim:#6b7da0;
    --line:rgba(120,160,230,.16); --line-s:rgba(120,160,230,.30);
    --cyan:#39e8ff; --green:#00ff99; --pink:#c084fc; --purple:#a855f7;
    --cat:var(--cyan);                /* per-category accent, set in JS */
    --rx-lg:22px; --rx-md:14px; --rx-sm:8px;
    --ease:cubic-bezier(.22,1,.36,1);
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{ height:100%; overflow:hidden; }
  body{
    color:var(--ink);
    font-family:"DM Sans",ui-sans-serif,system-ui,-apple-system,sans-serif;
    background:
      radial-gradient(ellipse 90% 80% at 50% 30%, rgba(20,30,60,.5), transparent 60%),
      radial-gradient(ellipse 70% 70% at 12% 6%, rgba(57,232,255,.10), transparent 58%),
      radial-gradient(ellipse 60% 60% at 90% 8%, rgba(168,85,247,.10), transparent 58%),
      linear-gradient(160deg, #05080f 0%, #070b16 56%, #060a12 100%);
  }

  /* ---------- fullscreen stage ---------- */
  .stage-wrap{ position:fixed; inset:0; z-index:1; overflow:hidden; }
  .stage{ position:absolute; top:50%; left:50%; width:1080px; height:1080px; transform-origin:center center; }

  /* ---------- news canvas ---------- */
  .news{
    position:relative; width:1080px; height:1080px;
    background:var(--bg);
    overflow:hidden; isolation:isolate;
    display:flex; flex-direction:column; justify-content:flex-end;
    padding:92px 88px 84px;
  }

  /* background photo */
  .news-bg{
    position:absolute; inset:0; z-index:0;
    background-position:50% 42%; background-size:cover; background-repeat:no-repeat;
    background-image:
      radial-gradient(ellipse 80% 70% at 70% 28%, rgba(57,232,255,.16), transparent 60%),
      radial-gradient(ellipse 70% 70% at 24% 14%, rgba(168,85,247,.16), transparent 60%),
      radial-gradient(ellipse 90% 80% at 50% 96%, rgba(0,255,153,.07), transparent 62%),
      linear-gradient(155deg, #0b1426 0%, #0a1120 50%, #070c17 100%);
    transition:filter .3s var(--ease);
  }
  /* vignette + bottom scrim so copy stays legible */
  .news-scrim{
    position:absolute; inset:0; z-index:1; pointer-events:none;
    background:
      linear-gradient(180deg, rgba(6,10,18,.42) 0%, rgba(6,10,18,0) 26%, rgba(6,10,18,.18) 50%, rgba(6,10,18,.74) 76%, rgba(6,10,18,.96) 100%),
      radial-gradient(120% 100% at 50% 38%, transparent 52%, rgba(6,10,18,.5) 100%);
  }
  /* dot matrix — brand signature, faint, upper area */
  .news-dots{
    position:absolute; inset:0; z-index:2; pointer-events:none;
    opacity:.34; mix-blend-mode:screen;
    background-image:
      image-set("hero-dot-matrix-static.avif" 1x type("image/avif"),
                "hero-dot-matrix-static.webp" 1x type("image/webp"),
                "hero-dot-matrix-static.png" 1x type("image/png"));
    background-position:50% 0%; background-repeat:no-repeat; background-size:cover;
    -webkit-mask-image:radial-gradient(150% 120% at 74% 14%, #000 0%, #000 30%, rgba(0,0,0,.4) 56%, transparent 78%);
    mask-image:radial-gradient(150% 120% at 74% 14%, #000 0%, #000 30%, rgba(0,0,0,.4) 56%, transparent 78%);
    -webkit-mask-size:100% 100%; mask-size:100% 100%;
    -webkit-mask-repeat:no-repeat; mask-repeat:no-repeat;
  }
  /* thin top hairline frame for the editorial frame feel */
  .news-frame{
    position:absolute; z-index:3; pointer-events:none;
    inset:34px 34px 34px 34px; border:1px solid rgba(180,205,255,.14); border-radius:6px;
  }

  /* corner brand tag (top-left) */
  .news-kicker{
    position:absolute; z-index:5; top:64px; left:88px;
    display:flex; align-items:center; gap:13px;
    font-family:"DM Mono",monospace; font-size:17px; letter-spacing:.14em; text-transform:uppercase;
    color:rgba(220,232,255,.78);
  }
  .news-kicker .wm{color:#fff; font-weight:500;}
  .news-kicker .wm sup{color:var(--cyan); font-size:.6em; top:-.55em;}
  .news-kicker .live{
    display:inline-flex; align-items:center; gap:8px; letter-spacing:.1em; color:rgba(220,232,255,.6);
  }
  .news-kicker .live .d{width:8px; height:8px; border-radius:50%; background:var(--green); box-shadow:0 0 10px var(--green);}

  /* drop hint (not exported) */
  .drop-hint{
    position:absolute; z-index:6; inset:0; display:flex; align-items:center; justify-content:center;
    pointer-events:none; opacity:0; transition:opacity .25s;
    font-family:"DM Mono",monospace; font-size:21px; letter-spacing:.04em; color:rgba(220,232,255,.66);
  }
  .news.drag .drop-hint{opacity:1;}
  .news.drag .news-bg{filter:brightness(.7) saturate(.8);}
  .drop-hint span{
    border:1.5px dashed rgba(150,185,255,.5); border-radius:16px; padding:26px 40px;
    background:rgba(8,14,28,.5); -webkit-backdrop-filter:blur(4px); backdrop-filter:blur(4px);
  }

  /* ---------- content block (bottom) ---------- */
  .news-content{ position:relative; z-index:5; display:flex; flex-direction:column; }

  /* category pill */
  .news-cat{
    display:inline-flex; align-items:center; gap:12px; align-self:flex-start;
    border:1px solid var(--line-s);
    background:linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.03));
    -webkit-backdrop-filter:blur(10px); backdrop-filter:blur(10px);
    border-radius:999px; padding:12px 22px; margin-bottom:30px;
    box-shadow:inset 0 1px rgba(255,255,255,.18);
    overflow:hidden; isolation:isolate;
    -webkit-mask-image:-webkit-radial-gradient(white, black);
    mask-image:radial-gradient(white, black);
  }
  .news-cat .c-label{
    font-family:"DM Mono",monospace; font-size:18px; font-weight:500;
    letter-spacing:.16em; text-transform:uppercase; color:#fff;
    white-space:nowrap; outline:none;
  }

  /* headline */
  .news-headline{
    font-family:"Clash Display","DM Sans",sans-serif;
    font-weight:600; font-size:78px; line-height:1.04; letter-spacing:-.018em;
    color:#fff; text-wrap:balance; max-width:920px;
    text-shadow:0 2px 40px rgba(0,0,0,.5);
    outline:none;
  }
  .news-headline:focus-visible,
  .news-summary:focus-visible,
  .c-label:focus-visible{outline:2px dashed var(--line-s); outline-offset:12px; border-radius:6px;}
  .news-headline .hl{
    color:transparent;
    background:linear-gradient(105deg, #39e8ff 0%, #00ff99 50%, #a855f7 100%);
    -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;
    filter:saturate(1.2) brightness(1.12) drop-shadow(0 0 26px rgba(57,232,255,.28));
  }

  /* summary deck */
  .news-summary{
    margin-top:26px; max-width:840px;
    font-family:"DM Sans",sans-serif; font-weight:400; font-size:30px; line-height:1.42;
    color:rgba(224,232,248,.86); text-wrap:pretty;
    outline:none;
  }

  /* footer meta */
  .news-foot{
    display:flex; align-items:center; gap:18px; flex-wrap:nowrap; white-space:nowrap;
    margin-top:40px; padding-top:30px; border-top:1px solid rgba(190,210,255,.18);
    font-family:"DM Mono",monospace; font-size:21px; letter-spacing:.02em;
  }
  .news-foot .src{color:#fff; font-weight:500;}
  .news-foot .sep{color:var(--dim);}
  .news-foot .date{color:var(--muted);}
  .news-foot .brand{
    margin-left:auto; display:flex; align-items:center; gap:10px;
    color:rgba(220,232,255,.7);
  }
  .news-foot .brand .wm{color:#fff;}
  .news-foot .brand .wm sup{color:var(--cyan); font-size:.6em; top:-.55em;}
  .news-foot .brand .av{
    width:40px; height:40px; border-radius:50%; object-fit:cover;
    border:1.5px solid rgba(180,205,255,.4);
  }

  /* ---------- image overlays ---------- */
  .q-overlay{position:absolute; z-index:20; cursor:move; user-select:none;}
  .q-overlay img{display:block; width:100%; height:auto; pointer-events:none; border-radius:4px;}
  .q-overlay-del,.q-overlay-resize{position:absolute; opacity:0; transition:opacity .18s;}
  .q-overlay:hover .q-overlay-del,.q-overlay:hover .q-overlay-resize{opacity:1;}
  .q-overlay-del{
    top:-11px; right:-11px; width:22px; height:22px; border-radius:50%;
    background:#fff; border:1.5px solid rgba(200,50,50,.55);
    color:#c00; font-size:15px; font-weight:700; line-height:20px;
    text-align:center; cursor:pointer; z-index:1; box-shadow:0 2px 8px rgba(0,0,0,.18);
  }
  .q-overlay-resize{
    bottom:-9px; right:-9px; width:20px; height:20px; border-radius:50%;
    background:#fff; border:2px solid var(--cyan); cursor:se-resize; z-index:1;
    box-shadow:0 2px 8px rgba(0,0,0,.18);
  }

  /* ---------- controls / dock ---------- */
  .ctrl-group{
    display:inline-flex; align-items:center; gap:10px;
    border:1px solid var(--line); background:rgba(255,255,255,.05);
    border-radius:999px; padding:7px 16px;
  }
  .ctrl-group label{font-family:"DM Mono",monospace; font-size:12px; color:var(--dim); white-space:nowrap;}
  .meta{font-family:"DM Mono",monospace; color:var(--dim); font-size:13px;}
  input[type=range]{accent-color:var(--cyan); width:120px;}
  input[type=number].q-num-input{
    font-family:"DM Mono",monospace; font-size:15px; font-weight:500;
    color:var(--ink); background:transparent; border:none; outline:none;
    width:42px; text-align:center; -moz-appearance:textfield;
  }
  input[type=number].q-num-input::-webkit-inner-spin-button,
  input[type=number].q-num-input::-webkit-outer-spin-button{-webkit-appearance:none; margin:0;}
  .ctrl-btn{
    display:inline-flex; align-items:center; gap:8px;
    border:1px solid var(--line-s); background:rgba(120,160,230,.08);
    color:var(--ink); border-radius:999px; padding:9px 17px; font-size:13px; cursor:pointer;
    font-family:inherit; transition:background .2s;
  }
  .ctrl-btn:hover{background:rgba(120,160,230,.18);}
  .ctrl-btn.primary{background:var(--cyan); color:#04121a; border-color:var(--cyan); font-weight:600;}
  .ctrl-btn.primary:hover{background:#5fefff;}
  .ctrl-btn.nav{padding:9px 14px; font-size:16px; line-height:1;}
  .ctrl-btn.hl-btn{border-color:rgba(57,232,255,.36); background:rgba(57,232,255,.08); padding:9px 18px;}
  .ctrl-btn.hl-btn:hover{background:rgba(57,232,255,.16);}
  .ctrl-btn.hl-btn .g{
    background:linear-gradient(105deg, #39e8ff, #00ff99 52%, #a855f7);
    -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;
    font-weight:600;
  }

  /* ── glassmorphic dock ── */
  .dock{
    position:fixed; bottom:0; left:0; right:0; z-index:200;
    padding:14px 32px 28px;
    display:flex; align-items:center; justify-content:center; flex-wrap:wrap; gap:14px;
    background:rgba(10,15,28,.72);
    -webkit-backdrop-filter:blur(24px) saturate(1.4); backdrop-filter:blur(24px) saturate(1.4);
    border-top:1px solid rgba(150,180,240,.2);
    box-shadow:0 -2px 32px rgba(0,0,0,.4), inset 0 1px rgba(255,255,255,.1);
    transform:translateY(100%);
    transition:transform .44s cubic-bezier(.22,1,.36,1);
  }
  .dock.open{transform:translateY(0);}
</style>
<script src="https://unpkg.com/html-to-image@1.11.13/dist/html-to-image.js"></script>

<body>
  <div class="stage-wrap">
    <div class="stage" id="stage">
      <div class="news" id="news" data-screen-label="News Card Canvas">
        <div class="news-bg" id="newsBg"></div>
        <div class="news-scrim"></div>
        <div class="news-dots"></div>
        <div class="news-frame"></div>

        <div class="news-kicker">
          <span class="wm">Pietro<sup>.works</sup></span>
          <span class="live"><span class="d"></span> DISPATCH</span>
        </div>

        <div class="drop-hint"><span>Drop a photo to set the background</span></div>

        <div class="news-content">
          <div class="news-cat">
            <span class="c-label" id="catLabel" contenteditable="true" spellcheck="false">ANALYSIS</span>
          </div>
          <div class="news-headline" id="headline" contenteditable="true" spellcheck="false"></div>
          <div class="news-summary" id="summary" contenteditable="true" spellcheck="false"></div>
          <div class="news-foot">
            <span class="src" id="src" contenteditable="true" spellcheck="false">June</span>
            <span class="sep">&middot;</span>
            <span class="date" id="date" contenteditable="true" spellcheck="false">2026</span>
            <span class="brand">
              <img class="av" src="pietro-portrait.png" alt="Pietro Impagliazzo"/>
              <span class="wm">Pietro<sup>.works</sup></span>
            </span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="dock" id="dock">
    <div class="ctrl-group">
      <button class="ctrl-btn nav" id="prevBtn" title="Previous">&#9664;</button>
      <input type="number" class="q-num-input" id="numInput" min="1" max="8" value="1"/>
      <span class="meta" id="totalCount">/ 8</span>
      <button class="ctrl-btn nav" id="nextBtn" title="Next">&#9654;</button>
    </div>
    <div class="ctrl-group">
      <label>size</label>
      <input type="checkbox" id="autoSize" checked title="auto-fit headline"/>
      <label for="autoSize" style="font-family:'DM Mono',monospace;font-size:12px;cursor:pointer;color:var(--muted)">auto</label>
      <input type="range" id="sizeRange" min="48" max="96" step="1" value="78" style="transition:opacity .2s"/>
      <span class="meta" id="sizeVal">auto</span>
    </div>
    <div class="ctrl-group">
      <label>accent</label>
      <button class="ctrl-btn hl-btn" id="accentBtn"><span class="g">&#9672; Apply</span></button>
      <button class="ctrl-btn" id="clearHlBtn">Clear</button>
    </div>
    <button class="ctrl-btn" id="bgBtn">&#128247; Background</button>
    <button class="ctrl-btn" id="addImgBtn">&#xFF0B; Logo</button>
    <button class="ctrl-btn" id="resetBtn">&#8635; Reset</button>
    <button class="ctrl-btn primary" id="dlBtn" style="display:none">&#8595; Download PNG</button>
    <span id="actionHint" style="font-family:'DM Mono',monospace;font-size:12px;color:var(--dim);opacity:0;transition:opacity .5s;pointer-events:none;display:inline-block;min-width:90px;text-align:center;"></span>
  </div>
  <input type="file" id="bgFileInput" accept="image/*" style="display:none;"/>
  <input type="file" id="imgFileInput" accept="image/*" style="display:none;"/>

  <script>
    const SIDE = 1080;

    /* category → brand accent */
    const CAT_ACCENT = {
      BREAKING:'#39e8ff', ANALYSIS:'#a855f7', INDUSTRY:'#00ff99',
      INSIGHT:'#c084fc', REPORT:'#39e8ff', OPINION:'#ffb86c'
    };
    function applyCatAccent(label){
      const key = (label||'').trim().toUpperCase();
      document.documentElement.style.setProperty('--cat', CAT_ACCENT[key] || '#39e8ff');
    }

    /* current month/year, auto-detected — no longer pulled from the TSV */
    function currentMonthLabel(){
      return new Date().toLocaleDateString('en-US', { month:'long' });
    }
    function currentYearLabel(){
      return String(new Date().getFullYear());
    }

    /* ── stage scaling ── */
    function fit(){
      const s = Math.min(window.innerWidth, window.innerHeight) / SIDE;
      document.getElementById('stage').style.transform = 'translate(-50%,-50%) scale('+s+')';
    }
    window.addEventListener('resize', fit);
    fit();

    /* ── TSV loader ── */
    let items = [];
    let currentIdx = parseInt(localStorage.getItem('pn-idx') || '0', 10);

    async function loadTSV(){
      try{
        const res = await fetch('news.tsv');
        const text = await res.text();
        const lines = text.trim().split('\n').slice(1);
        items = lines.map(function(line){
          const c = line.split('\t');
          return { id:c[0]||'', category:c[1]||'', headline:c[2]||'', highlight:c[3]||'',
                   summary:c[4]||'', source:c[5]||'', date:c[6]||'' };
        });
        document.getElementById('totalCount').textContent = '/ ' + items.length;
        document.getElementById('numInput').max = items.length;
        if(currentIdx >= items.length) currentIdx = 0;
        render(currentIdx);
      } catch(e){
        console.error('Could not load news.tsv:', e);
        document.getElementById('headline').textContent = 'Could not load news.tsv — serve over HTTP.';
      }
    }

    function escapeHtml(s){
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function render(n){
      if(!items.length) return;
      n = Math.max(0, Math.min(items.length - 1, n));
      currentIdx = n;
      localStorage.setItem('pn-idx', String(n));
      const it = items[n];

      document.getElementById('numInput').value = String(n + 1);
      document.getElementById('catLabel').textContent = it.category || 'NEWS';
      applyCatAccent(it.category);

      const hl = document.getElementById('headline');
      let html = escapeHtml(it.headline);
      if(it.highlight){
        const esc = escapeHtml(it.highlight);
        html = html.replace(esc, '<span class="hl">' + esc + '</span>');
      }
      hl.innerHTML = html;

      document.getElementById('summary').textContent = it.summary || '';
      document.getElementById('src').textContent = currentMonthLabel();
      document.getElementById('date').textContent = currentYearLabel();

      range.value = 96;
      fitHeadline();
    }

    /* ── navigation ── */
    document.getElementById('prevBtn').addEventListener('click', function(){ render(currentIdx - 1); });
    document.getElementById('nextBtn').addEventListener('click', function(){ render(currentIdx + 1); });

    const numInput = document.getElementById('numInput');
    numInput.addEventListener('change', function(){
      const v = parseInt(this.value, 10); if(!isNaN(v)) render(v - 1);
    });
    numInput.addEventListener('keydown', function(e){
      if(e.key === 'Enter'){ this.blur(); const v = parseInt(this.value,10); if(!isNaN(v)) render(v - 1); }
      if(e.key === 'ArrowUp'){ e.preventDefault(); render(currentIdx - 1); }
      if(e.key === 'ArrowDown'){ e.preventDefault(); render(currentIdx + 1); }
    });
    document.addEventListener('keydown', function(e){
      if(document.activeElement === numInput) return;
      if(document.activeElement && document.activeElement.isContentEditable) return;
      if(e.key === 'ArrowLeft' || e.key === 'ArrowUp'){ e.preventDefault(); render(currentIdx - 1); }
      if(e.key === 'ArrowRight' || e.key === 'ArrowDown'){ e.preventDefault(); render(currentIdx + 1); }
    });

    /* ── headline auto-fit ── */
    const range = document.getElementById('sizeRange');
    const sizeVal = document.getElementById('sizeVal');
    const autoCheck = document.getElementById('autoSize');

    function updateSliderState(){
      const isAuto = autoCheck.checked;
      range.disabled = isAuto;
      range.style.opacity = isAuto ? '0.35' : '1';
      range.style.pointerEvents = isAuto ? 'none' : 'auto';
    }
    updateSliderState();
    autoCheck.addEventListener('change', function(){ updateSliderState(); range.value = 96; fitHeadline(); });

    // bind the final two words of the headline so the last line is never one word.
    // normalizes existing nbsp first to avoid drift across repeated calls.
    function bindLastTwoWords(el){
      const walker = document.createTreeWalker(el, NodeFilter.SHOW_TEXT, null);
      const nodes = []; let node;
      while(node = walker.nextNode()) nodes.push(node);
      nodes.forEach(function(t){
        if(t.nodeValue.indexOf('\u00A0') !== -1){ t.nodeValue = t.nodeValue.replace(/\u00A0/g,' '); }
      });
      for(let i = nodes.length - 1; i >= 0; i--){
        const t = nodes[i].nodeValue;
        const idx = t.lastIndexOf(' ');
        if(idx !== -1){
          nodes[i].nodeValue = t.slice(0, idx) + '\u00A0' + t.slice(idx + 1);
          return;
        }
      }
    }

    function fitHeadline(){
      const hl = document.getElementById('headline');
      const content = document.querySelector('.news-content');
      const canvas = document.getElementById('news');
      if(!hl || !content || !canvas) return;
      // orphan guard: bind the last two words, unless the user is editing the headline
      if(document.activeElement !== hl) bindLastTwoWords(hl);
      // available height for the content block; shrink the headline until it clears
      const cap = autoCheck.checked ? 96 : parseInt(range.value, 10);
      let size = cap;
      hl.style.fontSize = size + 'px';
      const maxH = 720;
      let guard = 0;
      while(content.scrollHeight > maxH && size > 40 && guard < 240){
        size--; hl.style.fontSize = size + 'px'; guard++;
      }
      sizeVal.textContent = autoCheck.checked ? 'auto' : size + 'px';
      if(!autoCheck.checked) range.value = size;
    }
    range.addEventListener('input', function(){ if(!autoCheck.checked) fitHeadline(); });
    document.getElementById('news').addEventListener('input', function(e){
      const id = e.target.id;
      if(id === 'headline' || id === 'summary'){ if(!autoCheck.checked) range.value = 96; fitHeadline(); }
      if(id === 'catLabel'){ applyCatAccent(e.target.textContent); }
    });
    document.fonts.ready.then(fitHeadline);

    /* ── hint ── */
    function showHint(msg){
      const el = document.getElementById('actionHint');
      el.textContent = msg; el.style.opacity = '1';
      clearTimeout(window._hintT);
      window._hintT = setTimeout(function(){ el.style.opacity = '0'; }, 2000);
    }

    /* ── background image ── */
    const newsBg = document.getElementById('newsBg');
    function setBackground(src){
      newsBg.style.backgroundImage =
        "linear-gradient(180deg, rgba(6,10,18,.18) 0%, rgba(6,10,18,0) 30%, rgba(6,10,18,.55) 100%), url('"+src+"')";
    }
    const bgFileInput = document.getElementById('bgFileInput');
    document.getElementById('bgBtn').addEventListener('click', function(){ bgFileInput.click(); });
    bgFileInput.addEventListener('change', function(e){
      const f = e.target.files[0]; if(!f) return;
      setBackground(URL.createObjectURL(f)); bgFileInput.value=''; showHint('background set \u2713');
    });

    /* drag-drop anywhere on the card */
    const card = document.getElementById('news');
    ['dragenter','dragover'].forEach(function(ev){
      card.addEventListener(ev, function(e){ e.preventDefault(); card.classList.add('drag'); });
    });
    ['dragleave','drop'].forEach(function(ev){
      card.addEventListener(ev, function(e){
        e.preventDefault();
        if(ev==='dragleave' && e.relatedTarget && card.contains(e.relatedTarget)) return;
        card.classList.remove('drag');
      });
    });
    card.addEventListener('drop', function(e){
      const f = e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0];
      if(f && f.type.indexOf('image')===0){ setBackground(URL.createObjectURL(f)); showHint('background set \u2713'); }
    });

    /* ── reset ── */
    document.getElementById('resetBtn').addEventListener('click', function(){
      newsBg.style.backgroundImage = ''; // back to gradient default
      render(currentIdx); showHint('reset \u2713');
    });

    /* ── logo / image overlays ── */
    function getStageScale(){
      const t = document.getElementById('stage').style.transform;
      const m = t.match(/scale\(([\d.]+)\)/); return m ? parseFloat(m[1]) : 1;
    }
    function makeDraggable(el){
      let active=false,sx,sy,sl,st;
      el.addEventListener('mousedown',function(e){
        if(e.target.classList.contains('q-overlay-resize')||e.target.classList.contains('q-overlay-del')) return;
        active=true; sx=e.clientX; sy=e.clientY;
        sl=parseInt(el.style.left)||0; st=parseInt(el.style.top)||0; e.preventDefault();
      });
      document.addEventListener('mousemove',function(e){
        if(!active) return; const sc=getStageScale();
        el.style.left=(sl+(e.clientX-sx)/sc)+'px'; el.style.top=(st+(e.clientY-sy)/sc)+'px';
      });
      document.addEventListener('mouseup',function(){ active=false; });
    }
    function makeResizable(el,handle){
      let active=false,sx,sw;
      handle.addEventListener('mousedown',function(e){ active=true; sx=e.clientX; sw=el.offsetWidth; e.preventDefault(); e.stopPropagation(); });
      document.addEventListener('mousemove',function(e){ if(!active) return; const sc=getStageScale(); el.style.width=Math.max(40,sw+(e.clientX-sx)/sc)+'px'; });
      document.addEventListener('mouseup',function(){ active=false; });
    }
    function addOverlay(src){
      const wrap=document.createElement('div'); wrap.className='q-overlay';
      wrap.style.cssText='left:120px;top:120px;width:200px;';
      const img=document.createElement('img'); img.src=src;
      img.onload=function(){ const r=img.naturalHeight/img.naturalWidth; wrap.style.left='100px'; wrap.style.top='100px'; };
      const resH=document.createElement('div'); resH.className='q-overlay-resize';
      const del=document.createElement('div'); del.className='q-overlay-del'; del.textContent='\u00d7';
      del.addEventListener('click',function(){ wrap.remove(); });
      wrap.appendChild(img); wrap.appendChild(resH); wrap.appendChild(del);
      document.getElementById('news').appendChild(wrap);
      makeDraggable(wrap); makeResizable(wrap,resH);
    }
    const imgFileInput = document.getElementById('imgFileInput');
    document.getElementById('addImgBtn').addEventListener('click',function(){ imgFileInput.click(); });
    imgFileInput.addEventListener('change',function(e){ const f=e.target.files[0]; if(!f) return; addOverlay(URL.createObjectURL(f)); imgFileInput.value=''; });

    /* ── download button (HTTP only) ── */
    (function waitHTI(){
      if(typeof htmlToImage !== 'undefined'){
        const isFile = location.protocol === 'file:';
        const btn = document.getElementById('dlBtn');
        if(isFile){
          btn.style.display=''; btn.textContent='\u2b07 Download PNG';
          btn.title='Serve via HTTP to enable'; btn.style.opacity='0.4'; btn.style.cursor='not-allowed';
          btn.addEventListener('click',function(e){ e.preventDefault(); showHint('needs HTTP \u00b7 use fullscreen'); });
        } else { btn.style.display=''; }
      } else { setTimeout(waitHTI, 200); }
    })();

    /* ── unsharp mask ── */
    function gaussBlur(src,w,h,r){
      const sig=r/2||.6,rad=Math.max(1,Math.ceil(r*2));
      const k=new Float32Array(rad*2+1); let s=0;
      for(let i=-rad;i<=rad;i++){const v=Math.exp(-(i*i)/(2*sig*sig));k[i+rad]=v;s+=v;}
      for(let i=0;i<k.length;i++)k[i]/=s;
      const t=new Float32Array(w*h*3),o=new Float32Array(w*h*3);
      for(let y=0;y<h;y++)for(let x=0;x<w;x++){
        let cr=0,cg=0,cb=0;
        for(let j=-rad;j<=rad;j++){let sx=Math.max(0,Math.min(w-1,x+j));
          const wt=k[j+rad],si=(y*w+sx)*4;cr+=src[si]*wt;cg+=src[si+1]*wt;cb+=src[si+2]*wt;}
        const ti=(y*w+x)*3;t[ti]=cr;t[ti+1]=cg;t[ti+2]=cb;
      }
      for(let y=0;y<h;y++)for(let x=0;x<w;x++){
        let cr=0,cg=0,cb=0;
        for(let j=-rad;j<=rad;j++){let sy=Math.max(0,Math.min(h-1,y+j));
          const wt=k[j+rad],si=(sy*w+x)*3;cr+=t[si]*wt;cg+=t[si+1]*wt;cb+=t[si+2]*wt;}
        const oi=(y*w+x)*3;o[oi]=cr;o[oi+1]=cg;o[oi+2]=cb;
      }
      return o;
    }
    function unsharp(ctx,w,h,r,amt){
      const img=ctx.getImageData(0,0,w,h),d=img.data,bl=gaussBlur(d,w,h,r);
      for(let p=0,q=0;p<d.length;p+=4,q+=3){
        d[p]=Math.max(0,Math.min(255,d[p]+amt*(d[p]-bl[q])));
        d[p+1]=Math.max(0,Math.min(255,d[p+1]+amt*(d[p+1]-bl[q+1])));
        d[p+2]=Math.max(0,Math.min(255,d[p+2]+amt*(d[p+2]-bl[q+2])));
      }
      ctx.putImageData(img,0,0);
    }

    /* ── export pipeline ── */
    document.getElementById('dlBtn').addEventListener('click', async function(){
      if(location.protocol==='file:') return;
      const btn=this, node=document.getElementById('news'), stage=document.getElementById('stage');
      btn.textContent='… rendering'; btn.disabled=true;
      const prevT=stage.style.transform, prevH=stage.style.height;
      stage.style.transform='none'; stage.style.height=SIDE+'px';
      await document.fonts.ready; fitHeadline();
      await new Promise(function(r){ requestAnimationFrame(function(){ requestAnimationFrame(r); }); });
      try{
        const canvas=await htmlToImage.toCanvas(node,{ width:SIDE, height:SIDE, pixelRatio:2, cacheBust:false, style:{transform:'none'} });
        stage.style.transform=prevT; stage.style.height=prevH;
        unsharp(canvas.getContext('2d'),canvas.width,canvas.height,1.0,0.4);
        const num=String(currentIdx+1).padStart(3,'0');
        canvas.toBlob(function(blob){
          const url=URL.createObjectURL(blob);
          const a=document.createElement('a'); a.href=url; a.download='pietro-news-'+num+'.png';
          document.body.appendChild(a); a.click(); a.remove();
          setTimeout(function(){ URL.revokeObjectURL(url); },4000);
          btn.textContent='\u2713 downloaded';
          setTimeout(function(){ btn.textContent='\u2b07 Download PNG'; btn.disabled=false; },2400);
        },'image/png');
      }catch(e){
        console.error(e); stage.style.transform=prevT; stage.style.height=prevH;
        btn.textContent='\u2b07 Download PNG'; btn.disabled=false;
        showHint(String(e).replace('Error:','').trim().slice(0,48));
      }
    });

    /* ── accent selection ── */
    function applyAccent(){
      const sel=window.getSelection();
      if(!sel||sel.rangeCount===0||sel.isCollapsed){ showHint('select text first'); return; }
      const r=sel.getRangeAt(0);
      const hl=document.getElementById('headline');
      if(!hl.contains(r.commonAncestorContainer)){ showHint('select text in the headline'); return; }
      let anc=r.commonAncestorContainer; if(anc.nodeType===3) anc=anc.parentElement;
      const existing=anc.closest&&anc.closest('.hl');
      if(existing&&hl.contains(existing)){
        existing.replaceWith(document.createTextNode(existing.textContent));
        hl.normalize(); sel.removeAllRanges(); showHint('accent removed'); fitHeadline(); return;
      }
      try{
        const span=document.createElement('span'); span.className='hl';
        r.surroundContents(span); sel.removeAllRanges(); showHint('accent applied \u2713');
      }catch(e){
        const safe=r.toString().replace(/</g,'&lt;').replace(/>/g,'&gt;');
        document.execCommand('insertHTML',false,'<span class="hl">'+safe+'</span>');
        showHint('accent applied \u2713');
      }
      fitHeadline();
    }
    document.getElementById('accentBtn').addEventListener('click', applyAccent);
    document.getElementById('clearHlBtn').addEventListener('click', function(){
      const hl=document.getElementById('headline');
      hl.querySelectorAll('.hl').forEach(function(s){ s.replaceWith(document.createTextNode(s.textContent)); });
      hl.normalize(); showHint('accents cleared'); fitHeadline();
    });

    /* ── glassmorphic dock ── */
    const dock = document.getElementById('dock');
    let _dockTimer;
    document.addEventListener('mousemove', function(e){
      const near = e.clientY > window.innerHeight - 80;
      if(near){ clearTimeout(_dockTimer); dock.classList.add('open'); }
      else if(!dock.matches(':hover')){ clearTimeout(_dockTimer); _dockTimer=setTimeout(function(){ dock.classList.remove('open'); },500); }
    });
    dock.addEventListener('mouseenter', function(){ clearTimeout(_dockTimer); dock.classList.add('open'); });
    dock.addEventListener('mouseleave', function(){ clearTimeout(_dockTimer); _dockTimer=setTimeout(function(){ dock.classList.remove('open'); },480); });

    /* ── init ── */
    document.getElementById('src').textContent = currentMonthLabel();
    document.getElementById('date').textContent = currentYearLabel();
    loadTSV();
  </script>
</body>
</html>
